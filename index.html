<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockScreener</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --secondary: #8e8e93;
            --green: #32d74b;
            --red: #ff453a;
            --orange: #ff9f0a;
        }
        body { 
            font-family: -apple-system, system-ui; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px;
        }
        .sticky-header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        h1 { font-size: 34px; margin: 10px 0; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: none; background: var(--card); color: var(--text); 
            font-size: 17px; margin-bottom: 10px; box-sizing: border-box;
        }
        .stock-card { 
            background: var(--card); border-radius: 18px; 
            padding: 18px; margin-bottom: 12px; 
        }
        .row-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .ticker { font-size: 22px; font-weight: 800; }
        .price { font-size: 22px; font-weight: 700; }
        .row-stats { display: flex; justify-content: space-between; border-top: 1px solid #38383a; padding-top: 12px; }
        .stat { display: flex; flex-direction: column; }
        .label { font-size: 11px; color: var(--secondary); font-weight: 700; text-transform: uppercase; }
        .value { font-size: 16px; font-weight: 600; }

        /* DETALJSIDE (MODAL) */
        #detailPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000;
            display: none; overflow-y: auto;
            padding: env(safe-area-inset-top) 20px 50px 20px;
            box-sizing: border-box;
        }
        .back-btn { color: var(--green); font-size: 18px; cursor: pointer; margin-bottom: 20px; display: inline-block; }
        .detail-header { text-align: center; margin-bottom: 30px; }
        .detail-ticker { font-size: 40px; font-weight: 900; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .info-box { background: var(--card); padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="sticky-header">
    <h1>Screener</h1>
    <input type="text" id="search" placeholder="Søk ticker..." onkeyup="render()">
    <select id="sort" onchange="render()">
        <option value="ticker">Sorter etter: Navn</option>
        <option value="rsi">RSI (Oversolgt)</option>
        <option value="volum">Volumøkning</option>
        <option value="rr">Risk/Reward</option>
    </select>
</div>

<div id="list">Laster data...</div>

<div id="detailPage">
    <div class="back-btn" onclick="closeDetail()">✕ Lukk</div>
    <div id="detailContent"></div>
</div>

<script>
    let stocks = [];
    const DATA_URL = "https://gist.githubusercontent.com/gullesen/28b92c3d60b920d4ae061dd73d6a5570/raw/6d1b487cc60ea300ff04f67a8dc74037ab3ea22e/aksjer.json";

    async function loadData() {
        const res = await fetch(DATA_URL);
        stocks = await res.json();
        render();
    }

    function openDetail(ticker) {
        const s = stocks.find(x => x.Aksje === ticker);
        const detail = document.getElementById('detailContent');
        const page = document.getElementById('detailPage');
        
        detail.innerHTML = `
            <div class="detail-header">
                <div class="detail-ticker">${s.Aksje}</div>
                <div style="font-size: 24px; font-weight: bold;">${s["Siste kurs"].toFixed(2)}</div>
            </div>
            
            <div style="background: var(--card); border-radius: 15px; padding: 10px; margin-bottom: 20px;">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="info-grid">
                <div class="info-box"><div class="label">RSI (14)</div><div class="value">${s.RSI_14.toFixed(1)}</div></div>
                <div class="info-box"><div class="label">Volumøkning</div><div class="value">${s.Volum_vs_Snitt.toFixed(0)}%</div></div>
                <div class="info-box"><div class="label">Risk/Reward</div><div class="value">${s.Risk_Reward.toFixed(1)}</div></div>
                <div class="info-box"><div class="label">MACD</div><div class="value">${s.MACD}</div></div>
            </div>

            <div style="margin-top: 30px; background: var(--card); padding: 15px; border-radius: 15px;">
                <div style="display:flex; justify-content:space-between; margin-bottom: 10px;"><span>SMA 200</span><b>${s.SMA_200.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between; margin-bottom: 10px;"><span>EMA 20</span><b>${s.EMA_20.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between;"><span>Støtte (50)</span><b>${s.Stotte_50.toFixed(2)}</b></div>
            </div>
        `;
        
        page.style.display = 'block';
        document.body.style.overflow = 'hidden'; // Hindrer scrolling i bakgrunnen
        
        // Tegn en enkel graf
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: s.Historikk.map(h => h.dato),
                datasets: [{
                    label: 'Pris',
                    data: s.Historikk.map(h => h.pris),
                    borderColor: s.RS_dag >= 0 ? '#32d74b' : '#ff453a',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#333' } } } }
        });
    }

    function closeDetail() {
        document.getElementById('detailPage').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function render() {
        const query = document.getElementById('search').value.toUpperCase();
        const sortBy = document.getElementById('sort').value;
        let filtered = stocks.filter(s => s.Aksje.toUpperCase().includes(query));

        filtered.sort((a, b) => {
            if(sortBy === 'rsi') return a.RSI_14 - b.RSI_14;
            if(sortBy === 'volum') return b.Volum_vs_Snitt - a.Volum_vs_Snitt;
            if(sortBy === 'rr') return b.Risk_Reward - a.Risk_Reward;
            return a.Aksje.localeCompare(b.Aksje);
        });

        document.getElementById('list').innerHTML = filtered.map(s => `
            <div class="stock-card" onclick="openDetail('${s.Aksje}')">
                <div class="row-top">
                    <div><div class="ticker">${s.Aksje}</div><div style="color:${s.MACD_Trend==='Bull'?'var(--green)':'var(--red)'}; font-size:10px; font-weight:900;">${s.MACD_Trend}</div></div>
                    <div class="price">${s["Siste kurs"].toFixed(2)}</div>
                </div>
                <div class="row-stats">
                    <div class="stat"><div class="label">RSI</div><div class="value">${s.RSI_14.toFixed(1)}</div></div>
                    <div class="stat"><div class="label">Volum %</div><div class="value">${s.Volum_vs_Snitt.toFixed(0)}%</div></div>
                    <div class="stat"><div class="label">R/R</div><div class="value">${s.Risk_Reward.toFixed(1)}</div></div>
                </div>
            </div>
        `).join('');
    }
    loadData();
</script>
</body>
</html>

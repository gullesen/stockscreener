<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockScreener Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --secondary: #8e8e93;
            --green: #32d74b;
            --red: #ff453a;
            --blue: #0a84ff;
        }
        body { 
            font-family: -apple-system, system-ui; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px;
        }
        
        /* HEADER & SØK */
        .sticky-header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        h1 { font-size: 32px; font-weight: 800; margin: 5px 0 15px 0; }
        input, .sort-btn { 
            width: 100%; padding: 12px; border-radius: 12px; 
            border: none; background: var(--card); color: var(--text); 
            font-size: 16px; margin-bottom: 8px; box-sizing: border-box; outline: none;
        }
        .sort-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .active-sort { border: 1px solid var(--blue) !important; color: var(--blue); }

        /* LISTE */
        .stock-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
        .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ticker { font-size: 19px; font-weight: 800; }
        .price { font-size: 19px; font-weight: 700; }
        
        .row-indicators { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #2c2c2e; }
        .mini-stat { display: flex; flex-direction: column; align-items: flex-start; position: relative; }
        .label { font-size: 9px; color: var(--secondary); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: flex; align-items: center; gap: 3px; }
        .val { font-size: 13px; font-weight: 700; }
        .info-i { font-size: 10px; color: var(--blue); }

        /* DETALJSIDE */
        #detailPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; overflow-y: auto;
            padding: env(safe-area-inset-top) 20px 50px 20px; box-sizing: border-box;
        }
        .back-btn { color: var(--blue); font-size: 17px; font-weight: 600; margin-bottom: 20px; display: block; }
        .detail-header { text-align: center; margin-bottom: 20px; }
        .detail-ticker { font-size: 36px; font-weight: 900; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-box { background: var(--card); padding: 12px; border-radius: 14px; }
        
        .tech-list { background: var(--card); border-radius: 14px; padding: 5px 15px; margin-top: 20px; }
        .tech-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2c2c2e; font-size: 14px; align-items: center; }
        .tech-row:last-child { border-bottom: none; }
        .tech-row b { font-size: 14px; }
    </style>
</head>
<body>

<div class="sticky-header">
    <h1>Screener</h1>
    <input type="text" id="search" placeholder="Søk ticker..." onkeyup="render()">
    <div class="sort-row">
        <div id="btn-rsi" class="sort-btn" style="text-align:center" onclick="setSort('rsi')">RSI</div>
        <div id="btn-volum" class="sort-btn" style="text-align:center" onclick="setSort('volum')">Volum</div>
        <div id="btn-rr" class="sort-btn" style="text-align:center" onclick="setSort('rr')">R/R</div>
        <div id="btn-ticker" class="sort-btn" style="text-align:center" onclick="setSort('ticker')">Navn</div>
    </div>
</div>

<div id="list">Laster data...</div>

<div id="detailPage">
    <div class="back-btn" onclick="closeDetail()">← Tilbake</div>
    <div id="detailContent"></div>
</div>

<script>
    let stocks = [];
    let currentSort = 'ticker';
    let isAscending = true;

    // Forklaringer til tooltips
    const tooltips = {
        rsi: "RSI (14): Måler fart i kursbevegelser. Under 30 er oversolgt (billig), over 70 er overkjøpt (dyrt).",
        volum: "Volumøkning: Dagens handelsvolum sammenlignet med 20-dagers snitt. Høyt volum bekrefter styrke.",
        rr: "Risk/Reward: Forhold mellom oppside til motstand og nedside til støtte. Bør være over 2.0.",
        trend: "MACD Trend: Indikerer om det kortsiktige momentumet er stigende (Bull) eller fallende (Bear).",
        sma: "SMA 50/200: Enkelt glidende gjennomsnitt. 50 over 200 kalles 'Golden Cross'.",
        ema: "EMA 9/20: Eksponentielt gjennomsnitt som reagerer raskt på kursendringer.",
        boll: "Bollinger: Viser volatilitet. Kursen er vanligvis innenfor båndene 95% av tiden.",
        support: "Støtte/Motstand: Historiske nivåer hvor kursen ofte snur."
    };

    const DATA_URL = "https://gist.githubusercontent.com/gullesen/28b92c3d60b920d4ae061dd73d6a5570/raw/6d1b487cc60ea300ff04f67a8dc74037ab3ea22e/aksjer.json";

    async function load() {
        const res = await fetch(DATA_URL);
        stocks = await res.json();
        render();
    }

    function showTip(key) { alert(tooltips[key]); }

    function setSort(field) {
        if (currentSort === field) { isAscending = !isAscending; } 
        else { currentSort = field; isAscending = (field === 'ticker' || field === 'rsi'); }
        render();
    }

    function openDetail(ticker) {
        const s = stocks.find(x => x.Aksje === ticker);
        const detail = document.getElementById('detailContent');
        const page = document.getElementById('detailPage');
        
        detail.innerHTML = `
            <div class="detail-header">
                <div class="detail-ticker">${s.Aksje}</div>
                <div style="font-size: 26px; font-weight: 800;">${s["Siste kurs"].toFixed(2)}</div>
                <div onclick="showTip('trend')" style="color:${s.MACD_Trend==='Bull'?'#32d74b':'#ff453a'}; font-weight:900; font-size:12px; margin-top:5px;">${s.MACD_Trend.toUpperCase()} TREND ⓘ</div>
            </div>
            
            <div style="background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 20px;">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="info-grid">
                <div class="info-box" onclick="showTip('rsi')"><div class="label">RSI (14) ⓘ</div><div class="val" style="color:${s.RSI_14 < 35 ? '#32d74b' : (s.RSI_14 > 65 ? '#ff453a' : 'white')}">${s.RSI_14.toFixed(1)}</div></div>
                <div class="info-box" onclick="showTip('volum')"><div class="label">Volumøkning ⓘ</div><div class="val">${s.Volum_vs_Snitt.toFixed(0)}%</div></div>
                <div class="info-box" onclick="showTip('rr')"><div class="label">Risk/Reward ⓘ</div><div class="val" style="color:${s.Risk_Reward > 2 ? '#32d74b' : 'white'}">${s.Risk_Reward.toFixed(2)}</div></div>
                <div class="info-box"><div class="label">MACD</div><div class="val">${s.MACD.toFixed(2)}</div></div>
            </div>

            <div class="tech-list">
                <div class="tech-row" onclick="showTip('sma')"><span>SMA 50 / 200 ⓘ</span><b>${s.SMA_50.toFixed(2)} / ${s.SMA_200.toFixed(2)}</b></div>
                <div class="tech-row" onclick="showTip('ema')"><span>EMA 9 / 20 ⓘ</span><b>${s.EMA_9.toFixed(2)} / ${s.EMA_20.toFixed(2)}</b></div>
                <div class="tech-row" onclick="showTip('boll')"><span>Bollinger O/N ⓘ</span><b>${s.Ovre_Bollinger.toFixed(2)} / ${s.Nedre_Bollinger.toFixed(2)}</b></div>
                <div class="tech-row" onclick="showTip('support')"><span>Støtte / Motstand ⓘ</span><b>${s.Stotte_50.toFixed(2)} / ${s.Motstand_50.toFixed(2)}</b></div>
            </div>
        `;
        
        page.style.display = 'block';
        document.body.style.overflow = 'hidden';
        
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: s.Historikk.map(h => ""),
                datasets: [{
                    data: s.Historikk.map(h => h.pris),
                    borderColor: s.RS_dag >= 0 ? '#32d74b' : '#ff453a',
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.2
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#2c2c2e' } } } }
        });
    }

    function closeDetail() {
        document.getElementById('detailPage').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function render() {
        const query = document.getElementById('search').value.toUpperCase();
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active-sort'));
        const activeBtn = document.getElementById('btn-' + currentSort);
        activeBtn.classList.add('active-sort');
        activeBtn.innerHTML = currentSort.toUpperCase() + (isAscending ? " ↑" : " ↓");

        let filtered = stocks.filter(s => s.Aksje.toUpperCase().includes(query));

        filtered.sort((a, b) => {
            let valA, valB;
            if(currentSort === 'rsi') { valA = a.RSI_14; valB = b.RSI_14; }
            else if(currentSort === 'volum') { valA = a.Volum_vs_Snitt; valB = b.Volum_vs_Snitt; }
            else if(currentSort === 'rr') { valA = a.Risk_Reward; valB = b.Risk_Reward; }
            else { valA = a.Aksje; valB = b.Aksje; }
            if (valA < valB) return isAscending ? -1 : 1;
            if (valA > valB) return isAscending ? 1 : -1;
            return 0;
        });

        document.getElementById('list').innerHTML = filtered.map(s => `
            <div class="stock-card">
                <div class="row-top" onclick="openDetail('${s.Aksje}')">
                    <span class="ticker">${s.Aksje}</span>
                    <span class="price">${s["Siste kurs"].toFixed(2)}</span>
                </div>
                <div class="row-indicators">
                    <div class="mini-stat" onclick="showTip('trend')"><span class="label">Trend <span class="info-i">ⓘ</span></span><span class="val" style="color:${s.MACD_Trend==='Bull'?'var(--green)':'var(--red)'}">${s.MACD_Trend.toUpperCase()}</span></div>
                    <div class="mini-stat" onclick="showTip('rsi')"><span class="label">RSI <span class="info-i">ⓘ</span></span><span class="val" style="color:${s.RSI_14 < 35 ? 'var(--green)' : (s.RSI_14 > 65 ? 'var(--red)' : 'white')}">${s.RSI_14.toFixed(0)}</span></div>
                    <div class="mini-stat" onclick="showTip('volum')"><span class="label">Vol % <span class="info-i">ⓘ</span></span><span class="val">${s.Volum_vs_Snitt.toFixed(0)}%</span></div>
                    <div class="mini-stat" onclick="showTip('rr')"><span class="label">R/R <span class="info-i">ⓘ</span></span><span class="val" style="color:${s.Risk_Reward > 2 ? 'var(--green)' : 'white'}">${s.Risk_Reward.toFixed(1)}</span></div>
                </div>
            </div>
        `).join('');
    }
    load();
</script>
</body>
</html>

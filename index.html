<html lang="no">
<head>

  <!-- Chart.js + financial (candlestick) -->

  <style>
    :root{
      --bg:#0b1020;
      --panel:#111831;

<script>
/**
 * =========================
 *  KONFIG
 * =========================
 * Sett DATA_URL til hvor aksjer.json ligger.
 * - Samme mappe: "aksjer.json"
 * - Raw gist: "https://gist.githubusercontent.com/<user>/<gistid>/raw/aksjer.json"
 */
const DATA_URL = "https://gist.githubusercontent.com/gullesen/28b92c3d60b920d4ae061dd73d6a5570/raw/c3f09349a7ddb17f23cca301f031c71fc1173210/aksjer.json";

/**
 * =========================
 *  STATE
 * =========================
 */
let rawData = null;
let rows = [];
let selectedTicker = null;
let sortKey = "SetupScore";
let sortDir = "desc";

let priceChart = null;
let rsiChart = null;
let rsChart = null;

/**
 * =========================
 *  HELPERS: MATH
 * =========================
 */
const clamp = (x,min,max)=>Math.max(min,Math.min(max,x));
const pct = (x)=> (x>=0? "+" : "") + x.toFixed(2) + "%";

function sma(values, period){
  if(values.length < period) return null;
  let s = 0;
  for(let i=values.length-period; i<values.length; i++) s += values[i];
  return s/period;
}

function ema(values, period){
  if(values.length < period) return null;
  const k = 2/(period+1);
  let e = values[0];
  for(let i=1;i<values.length;i++){
    e = values[i]*k + e*(1-k);
  }
  return e;
}

function atr14(ohlc){
  // ATR(14) på dagsdata (Wilder). Returnerer siste verdi.
  if(!ohlc || ohlc.length < 16) return null;

  const trs = [];
  for(let i=1;i<ohlc.length;i++){
    const h = ohlc[i].high;
    const l = ohlc[i].low;
    const pc = ohlc[i-1].close;
    const tr = Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc));
    trs.push(tr);
  }
  if(trs.length < 14) return null;

  // Wilder smoothing
  let atr = trs.slice(0,14).reduce((a,b)=>a+b,0)/14;
  for(let i=14;i<trs.length;i++){
    atr = (atr*13 + trs[i]) / 14;
  }
  return atr;
}

function slope(values, n=10){
  // Enkel lineær helning (minst n punkter)
  if(values.length < n+1) return 0;
  const ys = values.slice(values.length-n);
  const xs = Array.from({length:n}, (_,i)=>i+1);
  const xbar = (n+1)/2;
  const ybar = ys.reduce((a,b)=>a+b,0)/n;

  let num=0, den=0;
  for(let i=0;i<n;i++){
    num += (xs[i]-xbar)*(ys[i]-ybar);
    den += (xs[i]-xbar)*(xs[i]-xbar);
  }
  return den===0 ? 0 : num/den;
}

/**
 * =========================
 *  INDICATORS: Trend / Setup / Risiko + Signal
 *  (bygget på feltene du har i JSON + OHLCV-historikk)
 * =========================
 */
function computeScores(stock, osebxMap){
  // historikk: [{dato, open, high, low, close, volume, rsi}]
  const hist = stock.Historikk || [];
  const closes = hist.map(d=>d.close);
  const volumes = hist.map(d=>d.volume);
  const rsis = hist.map(d=>d.rsi);

  const last = hist[hist.length-1];
  const prev = hist[hist.length-2];
  const lastClose = last?.close ?? stock["Siste kurs"] ?? null;

  // SMA/EMA (lokalt beregnet fra historikk for robusthet)
  const SMA50 = sma(closes, 50);
  const SMA200 = sma(closes, 200);
  const EMA20 = ema(closes, 20);
  const EMA200 = ema(closes, 200);

  // Volum snitt (20)
  const VolSMA20 = sma(volumes, 20);

  // 50d support/resistance (basert på close)
  const last50 = closes.slice(-50);
  const support50 = last50.length ? Math.min(...last50) : null;
  const resistance50 = last50.length ? Math.max(...last50) : null;

  // ATR
  const ohlc = hist.map(d=>({open:d.open, high:d.high, low:d.low, close:d.close}));
  const ATR = atr14(ohlc);

  // TrendScore (0-100)
  // - pris over/under SMA50, SMA50 over/under SMA200, og "styrke" i EMA20-slope
  let trend = 50;
  if(SMA50 && SMA200){
    trend += (SMA50 > SMA200) ? 18 : -18;
  }
  if(SMA50 && lastClose){
    trend += (lastClose > SMA50) ? 14 : -14;
  }
  if(EMA200 && lastClose){
    trend += (lastClose > EMA200) ? 8 : -8;
  }
  const ema20Slope = slope(closes, 15); // positiv = opptrend
  trend += clamp(ema20Slope * 6, -10, 10);

  // MACD_Trend fra backend
  if(stock.MACD_Trend === "Bull") trend += 6;
  else if(stock.MACD_Trend === "Bear") trend -= 6;

  trend = clamp(trend, 0, 100);

  // SetupScore (0-100)
  // Prioritet:
  // 1) Support bounce
  // 2) Breakout
  // 3) Pullback
  // Vi scorer høyere om volum støtter og RSI er "riktig".
  const rsi = stock.RSI_14 ?? last?.rsi ?? 50;
  const volRatio = (VolSMA20 && last?.volume) ? (last.volume / VolSMA20) : null;

  const near = (a,b,p=0.008)=> (a && b) ? (Math.abs(a-b)/b <= p) : false;

  // Bounce: var nær support i går og stiger i dag, helst RSI>40 og stigende
  const prevClose = prev?.close ?? null;
  const bounce =
    support50 && prevClose && lastClose &&
    (prevClose <= support50 * 1.01) &&
    (lastClose > prevClose) &&
    (rsi >= 40);

  // Breakout: close over resistance50 med litt margin og volum > snitt
  const breakout =
    resistance50 && lastClose &&
    (lastClose >= resistance50 * 1.005) &&
    (volRatio ? volRatio >= 1.1 : true);

  // Pullback: pris nær EMA20 (opptrend) + RSI mellom 40-60
  const pullback =
    EMA20 && lastClose && SMA50 && SMA200 &&
    (SMA50 > SMA200) &&
    near(lastClose, EMA20, 0.012) &&
    (rsi >= 40 && rsi <= 62);

  let setup = 20;

  // Signal-basert grunnscore
  if(bounce) setup += 55;
  else if(breakout) setup += 45;
  else if(pullback) setup += 38;
  else setup += 10;

  // Volum boost
  if(volRatio){
    if(volRatio >= 1.6) setup += 10;
    else if(volRatio >= 1.2) setup += 6;
    else if(volRatio < 0.8) setup -= 6;
  }

  // RSI finesse
  // - For trend setups: RSI 45-65 er ofte "sweet spot"
  if(rsi >= 45 && rsi <= 65) setup += 6;
  if(rsi >= 72) setup -= 8; // ofte sent i move
  if(rsi <= 32) setup += 4; // kan være mean-rev, men risiko høy

  // Trend alignment boost
  if(trend >= 70) setup += 6;
  if(trend < 45) setup -= 6;

  setup = clamp(setup, 0, 100);

  // RiskScore (0-100) – høyere = lavere risiko
  // Vi bruker:
  // - ATR% (volatilitet)
  // - avstand til support (hvor lett du kan definere stop)
  // - Risk/Reward fra backend
  let riskScore = 60;

  // ATR%: lav ATR% => tryggere
  if(ATR && lastClose){
    const atrPct = (ATR / lastClose) * 100;
    if(atrPct <= 1.6) riskScore += 12;
    else if(atrPct <= 2.5) riskScore += 6;
    else if(atrPct <= 3.5) riskScore -= 6;
    else riskScore -= 14;
  }

  // Avstand til support: veldig langt til støtte => vanskelig stop => mer risiko
  if(support50 && lastClose){
    const dist = (lastClose - support50) / lastClose; // 0.02 = 2%
    if(dist <= 0.03) riskScore += 10;
    else if(dist <= 0.06) riskScore += 4;
    else if(dist >= 0.12) riskScore -= 10;
    else if(dist >= 0.08) riskScore -= 4;
  }

  // Risk/Reward fra backend
  const rr = stock.Risk_Reward ?? null;
  if(rr !== null && rr !== undefined){
    if(rr >= 2.0) riskScore += 10;
    else if(rr >= 1.3) riskScore += 4;
    else if(rr <= 0.8) riskScore -= 10;
    else if(rr <= 1.0) riskScore -= 4;
  }

  // Trend ekstrem: veldig svak trend => høyere tail-risk
  if(trend < 35) riskScore -= 8;

  riskScore = clamp(riskScore, 0, 100);

  // Signal label + icon
  let signal = "Ingen";
  if(bounce) signal = "Support bounce";
  else if(breakout) signal = "Breakout";
  else if(pullback) signal = "Pullback";

  // RS vs OSEBX
  let rsVs = null;
  if(osebxMap && last?.dato && osebxMap[last.dato]){
    const idxClose = osebxMap[last.dato];
    rsVs = (idxClose && lastClose) ? (lastClose / idxClose) : null;
  }

  return {
    SMA50, SMA200, EMA20, EMA200, support50, resistance50,
    ATR,
    TrendScore: Math.round(trend),
    SetupScore: Math.round(setup),
    RiskScore: Math.round(riskScore),
    Signal: signal,
    volRatio,
    RSvsOSEBX: rsVs
  };
}

function scoreBadge(value, invert=false){
  // invert=false: høyere bedre (Trend/Setup/RiskScore)
  // invert=true: høyere dårligere (ikke brukt her)
  const v = value ?? 0;
  const x = invert ? (100 - v) : v;
  if(x >= 70) return {cls:"good", label:v};
  if(x >= 50) return {cls:"warn", label:v};
  return {cls:"bad", label:v};
}

function macdBadge(v){
  if(v === "Bull") return {cls:"good", label:"Bull"};
  if(v === "Bear") return {cls:"bad", label:"Bear"};
  return {cls:"warn", label:v ?? "–"};
}

function signalIcon(sig){
  if(sig === "Support bounce") return {cls:"good", txt:"↗"};
  if(sig === "Breakout") return {cls:"warn", txt:"⬆"};
  if(sig === "Pullback") return {cls:"warn", txt:"↩"};
  return {cls:"bad", txt:"·"};
}

/**
 * =========================
 *  LOAD + PREP
 * =========================
 */
async function loadData(){
  const res = await fetch(DATA_URL, {cache:"no-store"});
  if(!res.ok) throw new Error("Klarte ikke hente data: " + res.status);
  const data = await res.json();
  rawData = data;

  // Map OSEBX historikk for RS-beregning (dato -> close)
  const osebx = (data.aksjer || []).find(a => a.Aksje === "OSEBX.OL");
  const osebxMap = {};
  if(osebx?.Historikk){
    for(const d of osebx.Historikk){
      osebxMap[d.dato] = d.close;
    }
  }

  // Enrich rows
  rows = (data.aksjer || []).map(a => {
    const scores = computeScores(a, osebxMap);
    return {
      ...a,
      ...scores
    };
  });

  // RS vs OSEBX: normaliser til 100 (siste 200 dager) på detaljsiden senere
  document.getElementById("lastUpdated").textContent = data.oppdatert ?? "–";
  document.getElementById("count").textContent = rows.length;

  // Default selection: best SetupScore excluding OSEBX itself
  const pick = rows
    .filter(r=>r.Aksje !== "OSEBX.OL")
    .sort((a,b)=> (b.SetupScore - a.SetupScore))[0];

  renderTable();
  if(pick) selectRow(pick.Aksje);
}

/**
 * =========================
 *  TABLE RENDER + SORT
 * =========================
 */
function getFilteredRows(){
  const q = (document.getElementById("q").value || "").trim().toLowerCase();
  const fs = document.getElementById("filterSignal").value;
  const ft = document.getElementById("filterTrend").value;

  let out = rows.slice();

  if(q){
    out = out.filter(r => (r.Aksje || "").toLowerCase().includes(q) || (r.Navn || "").toLowerCase().includes(q));
  }
  if(fs !== "all"){
    out = out.filter(r => (r.Signal || "Ingen") === fs);
  }
  if(ft !== "all"){
    out = out.filter(r => {
      const t = r.TrendScore ?? 0;
      if(ft === "strong") return t >= 70;
      if(ft === "ok") return t >= 50 && t <= 69;
      if(ft === "weak") return t < 50;
      return true;
    });
  }

  // sort
  out.sort((a,b)=>{
    const av = a[sortKey];
    const bv = b[sortKey];

    // numeric first
    const an = (typeof av === "number") ? av : (av===null||av===undefined ? -Infinity : av);
    const bn = (typeof bv === "number") ? bv : (bv===null||bv===undefined ? -Infinity : bv);

    let cmp = 0;
    if(typeof an === "number" && typeof bn === "number"){
      cmp = an - bn;
    }else{
      cmp = String(av ?? "").localeCompare(String(bv ?? ""));
    }
    return sortDir === "asc" ? cmp : -cmp;
  });

  return out;
}

function renderTable(){
  const tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML = "";

  const view = getFilteredRows();
  document.getElementById("countShown").textContent = view.length;

  for(const r of view){
    const tr = document.createElement("tr");
    if(r.Aksje === selectedTicker) tr.classList.add("selected");

    const sig = signalIcon(r.Signal);
    const macd = macdBadge(r.MACD_Trend);

    const tB = scoreBadge(r.TrendScore);
    const sB = scoreBadge(r.SetupScore);
    const rB = scoreBadge(r.RiskScore);

    const rsVs = (r.RSvsOSEBX && r.RSvsOSEBX > 0) ? r.RSvsOSEBX : null;

    tr.innerHTML = `
      <td class="mono">
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="sig">
            <span class="icon ${sig.cls}">${sig.txt}</span>
          </span>
          <span style="font-weight:900;">${r.Aksje}</span>
        </div>
        <div class="muted" style="font-size:11px; margin-top:2px; max-width:260px; overflow:hidden; text-overflow:ellipsis;">
          ${r.Navn ?? ""}
        </div>
      </td>
      <td>
        <span class="badge ${sig.cls}">
          ${r.Signal}
        </span>
      </td>
      <td class="right mono">${(r["Siste kurs"] ?? 0).toFixed ? r["Siste kurs"].toFixed(2) : r["Siste kurs"]}</td>
      <td class="right mono">${(r.RSI_14 ?? 0).toFixed(2)}</td>
      <td><span class="badge ${macd.cls}">${macd.label}</span></td>
      <td class="right mono">${(r.Risk_Reward ?? 0).toFixed(2)}</td>
      <td class="right"><span class="badge ${tB.cls}">${tB.label}</span></td>
      <td class="right"><span class="badge ${sB.cls}">${sB.label}</span></td>
      <td class="right"><span class="badge ${rB.cls}">${rB.label}</span></td>
      <td class="right mono">${rsVs ? rsVs.toFixed(4) : "–"}</td>
    `;

    tr.addEventListener("click", ()=>selectRow(r.Aksje));
    tbody.appendChild(tr);
  }
}

function attachSort(){
  const ths = document.querySelectorAll("#tbl thead th");
  ths.forEach(th=>{
    th.addEventListener("click", ()=>{
      const k = th.dataset.k;
      if(!k) return;
      if(sortKey === k){
        sortDir = (sortDir === "asc") ? "desc" : "asc";
      }else{
        sortKey = k;
        sortDir = "desc";
      }
      renderTable();
    });
  });
}

/**
 * =========================
 *  DETAIL RENDER
 * =========================
 */
function selectRow(ticker){
  selectedTicker = ticker;
  renderTable();

  const s = rows.find(r=>r.Aksje === ticker);
  if(!s) return;

  document.getElementById("detailHint").textContent = "";
  const sig = signalIcon(s.Signal);

  const tB = scoreBadge(s.TrendScore);
  const seB = scoreBadge(s.SetupScore);
  const riB = scoreBadge(s.RiskScore);

  const rsi = s.RSI_14 ?? 50;
  const rsiBadge =
    (rsi >= 70) ? "bad" :
    (rsi >= 55) ? "warn" :
    (rsi >= 40) ? "good" : "warn";

  const rr = s.Risk_Reward ?? 0;

  const atr = s.ATR ? s.ATR : null;
  const lastClose = s.Historikk?.[s.Historikk.length-1]?.close ?? s["Siste kurs"];
  const atrPct = (atr && lastClose) ? (atr/lastClose*100) : null;

  const volRatio = s.volRatio ?? null;

  const detail = document.getElementById("detail");
  detail.innerHTML = `
    <div class="row">
      <div class="title">
        <div class="t1">
          <span class="mono">${s.Aksje}</span>
          <span class="sig"><span class="icon ${sig.cls}">${sig.txt}</span> ${s.Signal}</span>
        </div>
        <div class="t2">
          <span>${s.Navn ?? ""}</span>
          <span class="pill">Kurs: <b class="mono">${Number(s["Siste kurs"] ?? lastClose).toFixed(2)}</b></span>
          <span class="pill">RS dag: <b class="mono">${pct(s.RS_dag ?? 0)}</b></span>
        </div>
      </div>
    </div>

    <div class="kv">
      <div class="k">
        <div class="k1">Trend (0–100)</div>
        <div class="k2"><span class="badge ${tB.cls}">${s.TrendScore}</span></div>
        <div class="k3">SMA/EMA-alignment + slope + MACD</div>
      </div>
      <div class="k">
        <div class="k1">Setup (0–100)</div>
        <div class="k2"><span class="badge ${seB.cls}">${s.SetupScore}</span></div>
        <div class="k3">Bounce / breakout / pullback + RSI/volum</div>
      </div>
      <div class="k">
        <div class="k1">Risiko (0–100)</div>
        <div class="k2"><span class="badge ${riB.cls}">${s.RiskScore}</span></div>
        <div class="k3">ATR% + stop-struktur + R/R</div>
      </div>

      <div class="k">
        <div class="k1">RSI (14)</div>
        <div class="k2"><span class="badge ${rsiBadge}">${Number(rsi).toFixed(2)}</span></div>
        <div class="k3">30/70 terskler, 45–65 “sweet spot”</div>
      </div>
      <div class="k">
        <div class="k1">Volum vs 20d snitt</div>
        <div class="k2"><span class="badge ${volRatio && volRatio>=1.2 ? "good" : (volRatio && volRatio<0.8 ? "bad" : "warn")}">
          ${volRatio ? (volRatio.toFixed(2) + "×") : "–"}
        </span></div>
        <div class="k3">${volRatio ? "1.2×+ støtter bevegelse" : "Mangler data"}</div>
      </div>
      <div class="k">
        <div class="k1">Risk/Reward (50d)</div>
        <div class="k2"><span class="badge ${rr>=2 ? "good" : (rr>=1.3 ? "warn" : "bad")}">${Number(rr).toFixed(2)}</span></div>
        <div class="k3">Basert på 50d support/resistance</div>
      </div>
    </div>

    <div class="spark">
      <span class="pill">SMA50: <b class="mono">${s.SMA50 ? s.SMA50.toFixed(2) : (s.SMA_50 ?? 0).toFixed(2)}</b></span>
      <span class="pill">SMA200: <b class="mono">${s.SMA200 ? s.SMA200.toFixed(2) : (s.SMA_200 ?? 0).toFixed(2)}</b></span>
      <span class="pill">EMA20: <b class="mono">${s.EMA20 ? s.EMA20.toFixed(2) : (s.EMA_20 ?? 0).toFixed(2)}</b></span>
      <span class="pill">EMA200: <b class="mono">${s.EMA200 ? s.EMA200.toFixed(2) : (s.EMA_200 ?? 0).toFixed(2)}</b></span>
      <span class="pill">ATR14: <b class="mono">${atr ? atr.toFixed(3) : "–"}</b>${atrPct ? ` <span class="muted">(${atrPct.toFixed(2)}%)</span>` : ""}</span>
    </div>
  `;

  const note = document.getElementById("note");
  note.innerHTML = buildNote(s);

  drawCharts(s);
}

function buildNote(s){
  const sig = s.Signal;
  const trend = s.TrendScore ?? 0;
  const setup = s.SetupScore ?? 0;
  const risk = s.RiskScore ?? 0;

  const bullets = [];

  if(sig === "Support bounce"){
    bullets.push("**Support bounce** har høyest prioritet: forutsetter nylig test av 50d støtte og positiv reaksjon.");
    bullets.push("Sjekk at bounce skjer med *akseptabelt volum* og at RSI ikke er ekstremt overkjøpt.");
  } else if(sig === "Breakout"){
    bullets.push("**Breakout**: close over 50d motstand (gjerne med volum > snitt).");
    bullets.push("Vurder retest/pullback for bedre R/R hvis breakout er strukket.");
  } else if(sig === "Pullback"){
    bullets.push("**Pullback**: nær EMA20 i positiv trend (SMA50 > SMA200) med “ok” RSI.");
    bullets.push("Dette er ofte best når markedet generelt ikke er i risk-off.");
  } else {
    bullets.push("Ingen tydelig prioritetssignal fra reglene nå.");
  }

  bullets.push(`Score-bilde: Trend **${trend}**, Setup **${setup}**, Risiko **${risk}**.`);

  return `
    <div style="line-height:1.5;">
      <div style="font-weight:900; margin-bottom:6px;">Tolkning</div>
      <ul style="margin:0; padding-left:18px;">
        ${bullets.map(b=>`<li>${b}</li>`).join("")}
      </ul>
      <div style="margin-top:10px;" class="small">
        Tips: Bruk <span class="mono">Setup</span> for “hva”, <span class="mono">Trend</span> for “medvind”, og <span class="mono">Risiko</span> for pos-størrelse/stop.
      </div>
    </div>
  `;
}

/**
 * =========================
 *  CHARTS
 * =========================
 */
function destroyCharts(){
  if(priceChart){ priceChart.destroy(); priceChart = null; }
  if(rsiChart){ rsiChart.destroy(); rsiChart = null; }
  if(rsChart){ rsChart.destroy(); rsChart = null; }
}

function drawCharts(stock){
  destroyCharts();

  const hist = stock.Historikk || [];
  if(hist.length < 30) return;

  const labels = hist.map(d => d.dato);
  const candles = hist.map(d => ({
    x: d.dato,
    o: d.open,
    h: d.high,
    l: d.low,
    c: d.close
  }));
  const vols = hist.map(d => ({ x: d.dato, y: d.volume }));
  const rsis = hist.map(d => ({ x: d.dato, y: d.rsi }));

  // PRICE (candles) + volume bars
  const ctx1 = document.getElementById("priceChart").getContext("2d");
  priceChart = new Chart(ctx1, {
    type: "candlestick",
    data: {
      datasets: [
        {
          label: stock.Aksje,
          data: candles,
          // colors default (Chart.js financial uses built-in)
        },
        {
          type: "bar",
          label: "Volum",
          data: vols,
          yAxisID: "yVol",
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      plugins: {
        legend: { display: false },
        tooltip: { mode: "index", intersect: false }
      },
      scales: {
        x: {
          type: "time",
          time: { unit: "month" },
          grid: { color: "rgba(255,255,255,.06)" },
          ticks: { color: "rgba(231,236,255,.75)", maxRotation: 0 }
        },
        y: {
          position: "left",
          grid: { color: "rgba(255,255,255,.06)" },
          ticks: { color: "rgba(231,236,255,.75)" }
        },
        yVol: {
          position: "right",
          beginAtZero: true,
          grid: { display:false },
          ticks: { color: "rgba(231,236,255,.55)" }
        }
      }
    }
  });

  // RSI
  const ctx2 = document.getElementById("rsiChart").getContext("2d");
  rsiChart = new Chart(ctx2, {
    type: "line",
    data: {
      datasets: [{
        label: "RSI",
        data: rsis,
        pointRadius: 0,
        borderWidth: 2,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      plugins: { legend: { display:false } },
      scales: {
        x: {
          type: "time",
          time: { unit: "month" },
          grid: { color: "rgba(255,255,255,.06)" },
          ticks: { color: "rgba(231,236,255,.75)", maxRotation: 0 }
        },
        y: {
          min: 0, max: 100,
          grid: { color: "rgba(255,255,255,.06)" },
          ticks: { color: "rgba(231,236,255,.75)" }
        }
      }
    },
    plugins: [{
      id: "rsiLines",
      afterDraw(chart){
        const {ctx, chartArea, scales} = chart;
        const ys = scales.y;
        const lines = [30,50,70];
        ctx.save();
        ctx.strokeStyle = "rgba(231,236,255,.25)";
        ctx.setLineDash([6,6]);
        for(const v of lines){
          const y = ys.getPixelForValue(v);
          ctx.beginPath();
          ctx.moveTo(chartArea.left, y);
          ctx.lineTo(chartArea.right, y);
          ctx.stroke();
        }
        ctx.restore();
      }
    }]
  });

  // RS vs OSEBX (indexed to 100)
  const osebx = rows.find(r=>r.Aksje === "OSEBX.OL");
  const oseHist = osebx?.Historikk || [];
  const oseMap = {};
  for(const d of oseHist) oseMap[d.dato] = d.close;

  const rsSeries = [];
  for(const d of hist){
    if(!oseMap[d.dato]) continue;
    rsSeries.push({ x: d.dato, y: d.close / oseMap[d.dato] });
  }
  // index to 100
  if(rsSeries.length){
    const base = rsSeries[0].y;
    for(const p of rsSeries){
      p.y = (p.y / base) * 100;
    }
  }

  const ctx3 = document.getElementById("rsChart").getContext("2d");
  rsChart = new Chart(ctx3, {
    type: "line",
    data: {
      datasets: [{
        label: "RS vs OSEBX",
        data: rsSeries,
        pointRadius: 0,
        borderWidth: 2,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      plugins: { legend: { display:false } },
      scales: {
        x: {
          type: "time",
          time: { unit: "month" },
          grid: { color: "rgba(255,255,255,.06)" },
          ticks: { color: "rgba(231,236,255,.75)", maxRotation: 0 }
        },
        y: {
          grid: { color: "rgba(255,255,255,.06)" },
          ticks: { color: "rgba(231,236,255,.75)" }
        }
      }
    }
  });

  const last = hist[hist.length-1];
  document.getElementById("priceMeta").textContent = last ? `Siste: ${last.close.toFixed(2)} (${last.dato})` : "";
}

/**
 * =========================
 *  EVENTS
 * =========================
 */
document.getElementById("q").addEventListener("input", ()=>renderTable());
document.getElementById("filterSignal").addEventListener("change", ()=>renderTable());
document.getElementById("filterTrend").addEventListener("change", ()=>renderTable());

document.getElementById("btnReset").addEventListener("click", ()=>{
  document.getElementById("q").value = "";
  document.getElementById("filterSignal").value = "all";
  document.getElementById("filterTrend").value = "all";
  sortKey = "SetupScore";
  sortDir = "desc";
  renderTable();
});

document.getElementById("btnReload").addEventListener("click", async ()=>{
  document.getElementById("btnReload").textContent = "Oppdaterer…";
  try{
    await loadData();
  }finally{
    document.getElementById("btnReload").textContent = "Oppdater";
  }
});

attachSort();
loadData().catch(err=>{
  console.error(err);
  alert("Feil: " + err.message + "\n\nSjekk DATA_URL i index.html, og at aksjer.json er tilgjengelig.");
});
</script>

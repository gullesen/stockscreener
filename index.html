<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockScreener Pro v4.9</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --secondary: #8e8e93;
            --green: #32d74b;
            --red: #ff453a;
            --blue: #0a84ff;
            --orange: #ff9f0a;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: env(safe-area-inset-top) 15px 120px 15px;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* HOVEDSIDE */
        .sticky-header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        h1 { font-size: 32px; font-weight: 800; margin: 5px 0 10px 0; }
        input, .sort-btn, .filter-btn, textarea { 
            width: 100%; padding: 12px; border-radius: 12px; 
            border: none; background: var(--card); color: var(--text); 
            font-size: 14px; margin-bottom: 8px; box-sizing: border-box; outline: none;
        }
        .filter-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .filter-btn { flex: 1; font-weight: 600; }
        .active-filter { background: var(--blue) !important; }
        .sort-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .active-sort { border: 1px solid var(--blue) !important; color: var(--blue); }

        .stock-card { background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 12px; }
        .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ticker { font-size: 20px; font-weight: 800; }
        .price { font-size: 20px; font-weight: 700; }
        
        .list-badge { font-size: 9px; background: #3a3a3c; padding: 2px 5px; border-radius: 4px; color: var(--orange); margin-left: 4px; font-weight: 900; vertical-align: middle; }
        .profit-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 4px; }

        .row-indicators { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #2c2c2e; }
        .mini-stat { display: flex; flex-direction: column; }
        .label { font-size: 9px; color: var(--secondary); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: flex; align-items: center; gap: 3px; }
        .val { font-size: 14px; font-weight: 700; }
        .info-i { color: var(--blue); font-style: normal; font-size: 11px; }

        /* AKSJESIDEN */
        #detailPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; overflow-y: auto;
            padding: env(safe-area-inset-top) 20px 140px 20px; box-sizing: border-box;
        }
        .back-btn { color: var(--blue); font-size: 17px; font-weight: 600; margin-bottom: 20px; display: block; }
        .time-row { display: flex; justify-content: space-between; background: var(--card); border-radius: 12px; padding: 4px; margin-bottom: 15px; }
        .time-btn { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; font-weight: 700; color: var(--secondary); border-radius: 8px; }
        .time-btn.active { background: #3a3a3c; color: white; }
        
        .chart-container { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 20px; height: 260px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-box { background: var(--card); padding: 15px; border-radius: 15px; }
        
        .tech-list { background: var(--card); border-radius: 15px; padding: 5px 15px; margin-bottom: 20px; }
        .tech-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2c2c2e; font-size: 14px; }
        .tech-row:last-child { border-bottom: none; }

        .list-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .action-btn { padding: 14px; border-radius: 12px; border: 1px solid #3a3a3c; background: transparent; color: white; font-size: 13px; font-weight: 600; }
        .action-btn.active-mine { background: rgba(255, 159, 10, 0.15); border-color: var(--orange); color: var(--orange); }
        .action-btn.active-radar { background: rgba(10, 132, 255, 0.15); border-color: var(--blue); color: var(--blue); }

        .user-data-section { background: var(--card); border-radius: 18px; padding: 20px; margin-top: 10px; }
        .user-data-title { font-size: 14px; font-weight: 800; text-transform: uppercase; color: var(--secondary); margin-bottom: 15px; }
        .gav-input { background: #2c2c2e; width: 100%; margin: 8px 0 15px 0; height: 45px; text-align: left; padding: 0 15px; }
        textarea { background: #2c2c2e; resize: none; height: 100px; padding: 12px; margin-top: 5px; }

        #tooltipToast {
            position: fixed; bottom: -120px; left: 20px; right: 20px;
            background: #2c2c2e; color: white; padding: 16px; border-radius: 14px;
            z-index: 3000; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 5px solid var(--blue); box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #tooltipToast.active { bottom: 40px; }
    </style>
</head>
<body>

<div class="sticky-header">
    <h1>Screener</h1>
    <div class="filter-row">
        <button id="f-all" class="filter-btn active-filter" onclick="setFilter('all')">Alle</button>
        <button id="f-mine" class="filter-btn" onclick="setFilter('mine')">Mine</button>
        <button id="f-radar" class="filter-btn" onclick="setFilter('radar')">Radar</button>
    </div>
    <input type="text" id="search" placeholder="Søk ticker..." onkeyup="render()">
    <div class="sort-row">
        <div id="btn-rsi" class="sort-btn" onclick="setSort('rsi')">RSI</div>
        <div id="btn-volum" class="sort-btn" onclick="setSort('volum')">Vol</div>
        <div id="btn-rr" class="sort-btn" onclick="setSort('rr')">R/R</div>
        <div id="btn-ticker" class="sort-btn" onclick="setSort('ticker')">Navn</div>
    </div>
</div>

<div id="list">Laster data...</div>

<div id="detailPage">
    <div class="back-btn" onclick="closeDetail()">← Tilbake</div>
    <div id="detailContent"></div>
</div>

<div id="tooltipToast" onclick="hideTip()"></div>

<script>
    let stocks = [];
    let currentSort = 'ticker';
    let isAscending = true;
    let currentFilter = 'all';
    let myStocks = JSON.parse(localStorage.getItem('myStocks')) || [];
    let radarStocks = JSON.parse(localStorage.getItem('radarStocks')) || [];
    let myGAVs = JSON.parse(localStorage.getItem('myGAVs')) || {}; 
    let myNotes = JSON.parse(localStorage.getItem('myNotes')) || {}; 
    let currentChart = null;

    const tooltips = {
        rsi: "<b>RSI (14):</b> Momentum-indikator. Under 30 er oversolgt, over 70 er overkjøpt.",
        volum: "<b>Volumøkning:</b> Dagens volum mot 20-dagers snitt. Høyt volum bekrefter styrke.",
        rr: "<b>Risk/Reward:</b> Oppside mot nedside. Bør ideelt sett være over 2.0.",
        trend: "<b>Trend:</b> Basert på MACD. Indikerer BULL (opp) eller BEAR (ned) momentum.",
        sma: "<b>SMA:</b> Glidende snitt. SMA 200 er et viktig langsiktig nivå.",
        ema: "<b>EMA:</b> Eksponentielle snitt som reagerer raskere på prisendringer.",
        boll: "<b>Bollinger:</b> Viser volatilitet og prisbånd.",
        support: "<b>Støtte/Motstand:</b> Nivåer hvor kursen ofte snur."
    };

    const DATA_URL = "https://gist.githubusercontent.com/gullesen/28b92c3d60b920d4ae061dd73d6a5570/raw/6d1b487cc60ea300ff04f67a8dc74037ab3ea22e/aksjer.json";

    async function load() {
        const res = await fetch(DATA_URL);
        stocks = await res.json();
        render();
    }

    function showTip(e, key) {
        if(e) e.stopPropagation();
        const toast = document.getElementById('tooltipToast');
        toast.innerHTML = tooltips[key];
        toast.classList.add('active');
        setTimeout(hideTip, 5000);
    }
    function hideTip() { document.getElementById('tooltipToast').classList.remove('active'); }

    function toggleList(ticker, listType) {
        if (listType === 'mine') {
            const idx = myStocks.indexOf(ticker);
            if (idx > -1) myStocks.splice(idx, 1);
            else { myStocks.push(ticker); const rIdx = radarStocks.indexOf(ticker); if(rIdx > -1) radarStocks.splice(rIdx, 1); }
        } else {
            const idx = radarStocks.indexOf(ticker);
            if (idx > -1) radarStocks.splice(idx, 1);
            else { radarStocks.push(ticker); const mIdx = myStocks.indexOf(ticker); if(mIdx > -1) myStocks.splice(mIdx, 1); }
        }
        localStorage.setItem('myStocks', JSON.stringify(myStocks));
        localStorage.setItem('radarStocks', JSON.stringify(radarStocks));
        openDetail(ticker);
        render();
    }

    function saveData(ticker, field, val) {
        if (field === 'gav') {
            if (!val || val == 0) delete myGAVs[ticker];
            else myGAVs[ticker] = parseFloat(val);
            localStorage.setItem('myGAVs', JSON.stringify(myGAVs));
        } else {
            if (!val) delete myNotes[ticker];
            else myNotes[ticker] = val;
            localStorage.setItem('myNotes', JSON.stringify(myNotes));
        }
        render();
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
        document.getElementById('f-' + f).classList.add('active-filter');
        render();
    }

    function setSort(field) {
        if (currentSort === field) isAscending = !isAscending;
        else { currentSort = field; isAscending = (field === 'ticker' || field === 'rsi'); }
        render();
    }

    function openDetail(ticker) {
        const s = stocks.find(x => x.Aksje === ticker);
        const detail = document.getElementById('detailContent');
        const inMine = myStocks.includes(ticker);
        const inRadar = radarStocks.includes(ticker);
        const gav = myGAVs[ticker] || "";
        const note = myNotes[ticker] || "";
        
        let profitHtml = "";
        if (gav) {
            const diff = ((s["Siste kurs"] - gav) / gav) * 100;
            profitHtml = `<div style="color:${diff >= 0 ? 'var(--green)' : 'var(--red)'}; font-weight:800; font-size:18px; margin-top:5px;">${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%</div>`;
        }

        detail.innerHTML = `
            <div style="text-align:center; margin-bottom:20px;">
                <div style="font-size:36px; font-weight:900;">${s.Aksje}</div>
                <div style="font-size:26px; font-weight:800;">${s["Siste kurs"].toFixed(2)}</div>
                ${profitHtml}
            </div>

            <div class="time-row">
                <div class="time-btn" id="t-7" onclick="updateChart(7, '${ticker}')">1U</div>
                <div class="time-btn active" id="t-30" onclick="updateChart(30, '${ticker}')">1M</div>
                <div class="time-btn" id="t-90" onclick="updateChart(90, '${ticker}')">3M</div>
                <div class="time-btn" id="t-180" onclick="updateChart(180, '${ticker}')">6M</div>
                <div class="time-btn" id="t-365" onclick="updateChart(365, '${ticker}')">1Å</div>
            </div>

            <div class="chart-container"><canvas id="mainChart"></canvas></div>

            <div class="info-grid">
                <div class="info-box" onclick="showTip(event, 'rsi')"><div class="label">RSI (14) <i class="info-i">ⓘ</i></div><div class="val" style="color:${s.RSI_14 < 35 ? '#32d74b' : (s.RSI_14 > 65 ? '#ff453a' : 'white')}">${s.RSI_14.toFixed(1)}</div></div>
                <div class="info-box" onclick="showTip(event, 'volum')"><div class="label">Volumøkning <i class="info-i">ⓘ</i></div><div class="val">${s.Volum_vs_Snitt.toFixed(0)}%</div></div>
                <div class="info-box" onclick="showTip(event, 'rr')"><div class="label">Risk/Reward <i class="info-i">ⓘ</i></div><div class="val" style="color:${s.Risk_Reward > 2 ? '#32d74b' : 'white'}">${s.Risk_Reward.toFixed(2)}</div></div>
                <div class="info-box" onclick="showTip(event, 'trend')"><div class="label">Trend <i class="info-i">ⓘ</i></div><div class="val" style="color:${s.MACD_Trend === 'Bull' ? '#32d74b' : '#ff453a'}">${s.MACD_Trend}</div></div>
            </div>

            <div class="tech-list">
                <div class="tech-row" onclick="showTip(event, 'sma')"><span>SMA 50 / 200 ⓘ</span><b>${s.SMA_50.toFixed(2)} / ${s.SMA_200.toFixed(2)}</b></div>
                <div class="tech-row" onclick="showTip(event, 'ema')"><span>EMA 9 / 20 / 200 ⓘ</span><b>${s.EMA_9.toFixed(2)} / ${s.EMA_20.toFixed(2)} / ${(s.EMA_200 || 0).toFixed(2)}</b></div>
                <div class="tech-row" onclick="showTip(event, 'boll')"><span>Bollinger O/N ⓘ</span><b>${s.Ovre_Bollinger.toFixed(2)} / ${s.Nedre_Bollinger.toFixed(2)}</b></div>
                <div class="tech-row" onclick="showTip(event, 'support')"><span>Støtte / Motstand ⓘ</span><b>${s.Stotte_50.toFixed(2)} / ${s.Motstand_50.toFixed(2)}</b></div>
            </div>

            <div class="list-actions">
                <button class="action-btn ${inMine?'active-mine':''}" onclick="toggleList('${ticker}', 'mine')">${inMine?'✓ Mine aksjer':'+ Mine aksjer'}</button>
                <button class="action-btn ${inRadar?'active-radar':''}" onclick="toggleList('${ticker}', 'radar')">${inRadar?'✓ På radaren':'+ På radaren'}</button>
            </div>

            <div class="user-data-section">
                <div class="user-data-title">Mine data & Strategi</div>
                <div class="label">Gjennomsnittlig anskaffelsesverdi (GAV)</div>
                <input type="number" class="gav-input" value="${gav}" placeholder="0.00" onchange="saveData('${ticker}', 'gav', this.value)">
                
                <div class="label">Notater & Tradingstrategi</div>
                <textarea placeholder="F.eks. 'Kjøp ved breakout over motstand' eller 'Langsiktig utbyttecase'..." onchange="saveData('${ticker}', 'note', this.value)">${note}</textarea>
            </div>
        `;
        document.getElementById('detailPage').style.display = 'block';
        updateChart(30, ticker);
    }

    function updateChart(dager, ticker) {
        const s = stocks.find(x => x.Aksje === ticker);
        const history = s.Historikk.slice(-dager);
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + dager).classList.add('active');
        if (currentChart) currentChart.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(h => h.dato),
                datasets: [{
                    data: history.map(h => h.pris),
                    borderColor: s.RS_dag >= 0 ? '#32d74b' : '#ff453a',
                    borderWidth: 2.5,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(10, 132, 255, 0.05)',
                    tension: 0.3
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#8e8e93', autoSkip: true, maxTicksLimit: 5, font: { size: 10 } }, grid: { display: false } },
                    y: { grid: { color: '#2c2c2e' }, ticks: { color: '#8e8e93', font: { size: 10 } } }
                }
            }
        });
    }

    function render() {
        const query = document.getElementById('search').value.toUpperCase();
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active-sort'));
        const activeBtn = document.getElementById('btn-' + currentSort);
        activeBtn.classList.add('active-sort');
        activeBtn.innerHTML = currentSort.toUpperCase() + (isAscending ? "↑" : "↓");

        let filtered = stocks.filter(s => {
            const matchesSearch = s.Aksje.toUpperCase().includes(query);
            if (currentFilter === 'mine') return matchesSearch && myStocks.includes(s.Aksje);
            if (currentFilter === 'radar') return matchesSearch && radarStocks.includes(s.Aksje);
            return matchesSearch;
        });

        filtered.sort((a, b) => {
            let vA, vB;
            if(currentSort === 'rsi') { vA = a.RSI_14; vB = b.RSI_14; }
            else if(currentSort === 'volum') { vA = a.Volum_vs_Snitt; vB = b.Volum_vs_Snitt; }
            else if(currentSort === 'rr') { vA = a.Risk_Reward; vB = b.Risk_Reward; }
            else { vA = a.Aksje; vB = b.Aksje; }
            return isAscending ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
        });

        document.getElementById('list').innerHTML = filtered.map(s => {
            const gav = myGAVs[s.Aksje];
            let profitHtml = "";
            if (gav) {
                const diff = ((s["Siste kurs"] - gav) / gav) * 100;
                profitHtml = `<span class="profit-badge" style="background:${diff >= 0 ? 'rgba(50,215,75,0.2)' : 'rgba(255,69,58,0.2)'}; color:${diff >= 0 ? 'var(--green)' : 'var(--red)'}">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
            }
            return `
                <div class="stock-card" onclick="openDetail('${s.Aksje}')">
                    <div class="row-top">
                        <span class="ticker">${s.Aksje} ${myStocks.includes(s.Aksje)?'<span class="list-badge">MINE</span>':''} ${radarStocks.includes(s.Aksje)?'<span class="list-badge" style="color:var(--blue)">RADAR</span>':''} ${profitHtml}</span>
                        <span class="price">${s["Siste kurs"].toFixed(2)}</span>
                    </div>
                    <div class="row-indicators">
                        <div class="mini-stat" onclick="showTip(event, 'rsi')"><span class="label">RSI <i class="info-i">ⓘ</i></span><span class="val">${s.RSI_14.toFixed(0)}</span></div>
                        <div class="mini-stat" onclick="showTip(event, 'volum')"><span class="label">Vol % <i class="info-i">ⓘ</i></span><span class="val">${s.Volum_vs_Snitt.toFixed(0)}%</span></div>
                        <div class="mini-stat" onclick="showTip(event, 'trend')"><span class="label">Trend <i class="info-i">ⓘ</i></span><span class="val">${s.MACD_Trend}</span></div>
                        <div class="mini-stat" onclick="showTip(event, 'rr')"><span class="label">R/R <i class="info-i">ⓘ</i></span><span class="val">${s.Risk_Reward.toFixed(1)}</span></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }
    load();
</script>
</body>
</html>

<script>
    // ... (resten av koden forblir lik)

    let currentChart = null; // Lagre graf-instansen for å kunne oppdatere den

    function openDetail(ticker) {
        const s = stocks.find(x => x.Aksje === ticker);
        const detail = document.getElementById('detailContent');
        const page = document.getElementById('detailPage');
        
        detail.innerHTML = `
            <div style="text-align:center; margin-bottom:20px;">
                <div style="font-size:36px; font-weight:900;">${s.Aksje}</div>
                <div style="font-size:26px; font-weight:800;">${s["Siste kurs"].toFixed(2)}</div>
                <div onclick="showTip(event, 'trend')" style="color:${s.MACD_Trend==='Bull'?'#32d74b':'#ff453a'}; font-weight:900; font-size:12px; margin-top:5px;">${s.MACD_Trend.toUpperCase()} TREND ⓘ</div>
            </div>

            <div style="display: flex; justify-content: space-between; background: var(--card); border-radius: 12px; padding: 4px; margin-bottom: 15px;">
                <div class="time-btn active" id="t-5" onclick="updateTime(5, '${s.Aksje}')">1U</div>
                <div class="time-btn" id="t-21" onclick="updateTime(21, '${s.Aksje}')">1M</div>
                <div class="time-btn" id="t-63" onclick="updateTime(63, '${s.Aksje}')">3M</div>
                <div class="time-btn" id="t-126" onclick="updateTime(126, '${s.Aksje}')">6M</div>
                <div class="time-btn" id="t-250" onclick="updateTime(250, '${s.Aksje}')">1Å</div>
            </div>
            
            <div style="background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 20px; height: 220px;">
                <canvas id="mainChart"></canvas>
            </div>

            `;

        // CSS for tidsknappene (legg dette i <style> feltet ditt)
        /*
        .time-btn { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; font-weight: 700; color: var(--secondary); border-radius: 8px; cursor: pointer; }
        .time-btn.active { background: #3a3a3c; color: white; }
        */

        page.style.display = 'block';
        document.body.style.overflow = 'hidden';
        
        // Initialiser grafen med 1 måned (21 dager) som default
        updateTime(21, s.Aksje);
    }

    function updateTime(dager, ticker) {
        const s = stocks.find(x => x.Aksje === ticker);
        const dataSnippet = s.Historikk.slice(-dager);
        
        // Oppdater knapp-styling
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('t-' + dager);
        if(btn) btn.classList.add('active');

        const ctx = document.getElementById('mainChart').getContext('2d');
        
        if (currentChart) { currentChart.destroy(); } // Fjern gammel graf før ny tegnes

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dataSnippet.map(h => h.dato),
                datasets: [{
                    data: dataSnippet.map(h => h.pris),
                    borderColor: s.RS_dag >= 0 ? '#32d74b' : '#ff453a',
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.2,
                    fill: true,
                    backgroundColor: s.RS_dag >= 0 ? 'rgba(50, 215, 75, 0.1)' : 'rgba(255, 69, 58, 0.1)'
                }]
            },
            options: { 
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }, 
                scales: { 
                    x: { display: false }, 
                    y: { 
                        grid: { color: '#2c2c2e' },
                        ticks: { color: '#8e8e93', font: { size: 10 } }
                    } 
                } 
            }
        });
    }
</script>

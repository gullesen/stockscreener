<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockScreener</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4222/4222031.png">

    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --secondary: #8e8e93;
            --green: #32d74b;
            --red: #ff453a;
            --orange: #ff9f0a;
            --blue: #0a84ff;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); 
            margin: 0; padding: env(safe-area-inset-top) 15px 100px 15px;
            -webkit-user-select: none;
        }
        
        .sticky-header {
            position: sticky; top: 0; background: var(--bg);
            padding: 10px 0 15px 0; z-index: 1000;
        }
        
        h1 { font-size: 34px; font-weight: 800; margin: 10px 0; }

        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: none; background: var(--card); color: var(--text); 
            font-size: 17px; margin-bottom: 10px; box-sizing: border-box;
            -webkit-appearance: none;
        }

        .stock-card { 
            background: var(--card); border-radius: 18px; 
            padding: 18px; margin-bottom: 12px; 
            transition: transform 0.1s;
        }
        .stock-card:active { transform: scale(0.98); background: #2c2c2e; }

        .row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .ticker-box { display: flex; flex-direction: column; }
        .ticker { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .trend-badge { 
            font-size: 10px; font-weight: 900; padding: 3px 6px; 
            border-radius: 5px; text-transform: uppercase; margin-top: 4px; width: fit-content;
        }
        .bull { background: rgba(50, 215, 75, 0.15); color: var(--green); }
        .bear { background: rgba(255, 69, 58, 0.15); color: var(--red); }

        .price { font-size: 22px; font-weight: 700; }

        .row-stats { display: flex; justify-content: space-between; border-top: 1px solid #38383a; padding-top: 12px; }
        .stat { display: flex; flex-direction: column; align-items: flex-start; }
        .label { font-size: 11px; color: var(--secondary); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .value { font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

<div class="sticky-header">
    <h1>Screener</h1>
    <input type="text" id="search" placeholder="Søk ticker..." onkeyup="render()">
    <select id="sort" onchange="render()">
        <option value="ticker">Sorter etter: Navn (A-Å)</option>
        <option value="rsi_low">Sorter etter: RSI (Oversolgt)</option>
        <option value="rsi_high">Sorter etter: RSI (Overkjøpt)</option>
        <option value="volum">Sorter etter: Volumøkning</option>
        <option value="rr">Sorter etter: Risk/Reward</option>
    </select>
</div>

<div id="list">Henter data fra GitHub...</div>

<script>
    let stocks = [];
    // Din oppdaterte RAW-lenke:
    const DATA_URL = "https://gist.githubusercontent.com/gullesen/28b92c3d60b920d4ae061dd73d6a5570/raw/6d1b487cc60ea300ff04f67a8dc74037ab3ea22e/aksjer.json";

    async function loadData() {
        try {
            const res = await fetch(DATA_URL);
            stocks = await res.json();
            render();
        } catch (e) {
            document.getElementById('list').innerHTML = `<div style="padding:20px;text-align:center;color:red;">Kunne ikke laste data. Sjekk internett eller URL.</div>`;
        }
    }

    function getTooltip(s) {
        return `INDIKATORER FOR ${s.Aksje}:\n\n` +
               `RSI: ${s.RSI_14.toFixed(1)} (Under 30 er ofte billig)\n` +
               `Volum: ${s.Volum_vs_Snitt.toFixed(0)}% over snitt\n` +
               `Risk/Reward: ${s.Risk_Reward.toFixed(1)} (Over 2.0 er bra)\n` +
               `SMA 200: ${s.SMA_200.toFixed(2)}`;
    }

    function render() {
        const query = document.getElementById('search').value.toUpperCase();
        const sortBy = document.getElementById('sort').value;
        
        let filtered = stocks.filter(s => s.Aksje.toUpperCase().includes(query));

        filtered.sort((a, b) => {
            if(sortBy === 'rsi_low') return a.RSI_14 - b.RSI_14;
            if(sortBy === 'rsi_high') return b.RSI_14 - a.RSI_14;
            if(sortBy === 'volum') return b.Volum_vs_Snitt - a.Volum_vs_Snitt;
            if(sortBy === 'rr') return b.Risk_Reward - a.Risk_Reward;
            return a.Aksje.localeCompare(b.Aksje);
        });

        const listDiv = document.getElementById('list');
        if (filtered.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center;padding:50px;color:gray;">Ingen aksjer funnet...</div>';
            return;
        }

        listDiv.innerHTML = filtered.map(s => `
            <div class="stock-card" onclick="alert(getTooltip(${JSON.stringify(s).replace(/"/g, '&quot;')}))">
                <div class="row-top">
                    <div class="ticker-box">
                        <span class="ticker">${s.Aksje}</span>
                        <span class="trend-badge ${s.MACD_Trend === 'Bull' ? 'bull' : 'bear'}">${s.MACD_Trend}</span>
                    </div>
                    <span class="price">${s["Siste kurs"].toFixed(2)}</span>
                </div>
                <div class="row-stats">
                    <div class="stat">
                        <span class="label">RSI (14)</span>
                        <span class="value" style="color:${s.RSI_14 < 30 ? 'var(--green)' : (s.RSI_14 > 70 ? 'var(--red)' : 'white')}">
                            ${s.RSI_14.toFixed(1)}
                        </span>
                    </div>
                    <div class="stat">
                        <span class="label">Volumøkning</span>
                        <span class="value" style="color:${s.Volum_vs_Snitt > 50 ? 'var(--orange)' : 'white'}">
                            ${s.Volum_vs_Snitt.toFixed(0)}%
                        </span>
                    </div>
                    <div class="stat">
                        <span class="label">Risk/Reward</span>
                        <span class="value" style="color:${s.Risk_Reward > 2 ? 'var(--green)' : 'white'}">
                            ${s.Risk_Reward.toFixed(1)}
                        </span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    loadData();
</script>
</body>
</html>

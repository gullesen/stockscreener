<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockScreener Pro v8.4</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- ✅ Stabil kombinasjon for candlestick -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>

    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --secondary: #8e8e93;
            --green: #32d74b; --red: #ff453a; --blue: #0a84ff; --orange: #ff9f0a;
            --yellow: #ffd60a;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: env(safe-area-inset-top) 15px 120px 15px; -webkit-tap-highlight-color: transparent;
        }
        .sticky-header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .timestamp-container { text-align: right; line-height: 1.2; }
        .update-label { font-size: 8px; color: var(--blue); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: block; }
        .update-time { font-size: 10px; color: var(--secondary); font-weight: 600; white-space: nowrap; }

        input, .sort-btn, .filter-btn, textarea {
            width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--card); color: var(--text);
            font-size: 14px; margin-bottom: 8px; box-sizing: border-box; outline: none;
        }
        .filter-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .filter-btn { flex: 1; font-weight: 600; }
        .active-filter { background: var(--blue) !important; }
        .sort-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .active-sort { border: 1px solid var(--blue) !important; color: var(--blue); }

        .stock-card { background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 12px; }
        .row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .ticker { font-size: 19px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .price { font-size: 20px; font-weight: 700; display:flex; align-items:center; gap:10px; }

        .triple-icons { display:inline-flex; gap:6px; align-items:center; }
        .sig-dot { font-size: 16px; line-height: 1; filter: saturate(1.1); }

        .list-badge { font-size: 9px; background: #3a3a3c; padding: 2px 5px; border-radius: 4px; color: var(--orange); font-weight: 900; }
        .profit-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 5px;}
        .row-indicators { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #2c2c2e; }
        .mini-stat { display: flex; flex-direction: column; }
        .label { font-size: 9px; color: var(--secondary); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .val { font-size: 14px; font-weight: 700; }
        .info-i { color: var(--blue); font-style: normal; font-size: 11px; margin-left: 2px; }

        #detailPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000;
            display: none; overflow-y: auto; padding: env(safe-area-inset-top) 20px 140px 20px; box-sizing: border-box;
        }
        .detail-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { color: var(--blue); font-size: 17px; font-weight: 600; cursor: pointer; }

        .charts-wrapper {
            background: var(--card);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chart-price-container {
            position: relative;
            height: min(46vh, 340px);
            min-height: 220px;
        }
        .chart-rsi-container {
            position: relative;
            height: min(26vh, 180px);
            min-height: 130px;
        }
        .chart-price-container canvas,
        .chart-rsi-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .info-box { background: var(--card); padding: 15px; border-radius: 15px; }

        /* 3-lags signalboks */
        .signal-box {
            background: var(--card);
            border-radius: 15px;
            padding: 14px 15px;
            margin-bottom: 18px;
            border: 1px solid #2c2c2e;
        }
        .signal-title {
            font-size: 10px;
            color: var(--secondary);
            font-weight: 900;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .signal-rows { display:flex; flex-direction:column; gap:10px; }
        .signal-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
        .signal-left { display:flex; flex-direction:column; gap:4px; flex:1; }
        .signal-label { font-size: 12px; font-weight: 900; letter-spacing: 0.3px; }
        .signal-reason { font-size: 12px; color: var(--secondary); font-weight: 650; line-height: 1.25; }
        .signal-pill {
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            border: 1px solid #3a3a3c;
            white-space: nowrap;
        }

        .tech-list { background: var(--card); border-radius: 15px; padding: 5px 15px; margin-bottom: 20px; }
        .tech-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2c2c2e; font-size: 14px; }
        .rel-strength-box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .rel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; text-align: center; }
        .list-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .action-btn { padding: 14px; border-radius: 12px; border: 1px solid #3a3a3c; background: transparent; color: white; font-size: 13px; font-weight: 600; }
        .time-row { display: flex; justify-content: space-between; background: var(--card); border-radius: 12px; padding: 4px; margin-bottom: 15px; }
        .time-btn { flex: 1; text-align: center; padding: 8px 0; font-size: 11px; font-weight: 700; color: var(--secondary); border-radius: 8px; }
        .time-btn.active { background: #3a3a3c; color: white; }
        .chart-type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: -4px 0 12px; }
        .chart-type-btn { background: var(--card); border: 1px solid #3a3a3c; border-radius: 10px; padding: 8px 0; color: var(--secondary); font-size: 11px; font-weight: 800; text-align: center; }
        .chart-type-btn.active { background: #3a3a3c; color: #fff; border-color: #4a4a4c; }
        .user-data-section { background: var(--card); border-radius: 18px; padding: 20px; margin-top: 10px; }
        #tooltipToast {
            position: fixed; bottom: -150px; left: 20px; right: 20px; background: #2c2c2e; color: white;
            padding: 18px; border-radius: 14px; z-index: 3000; transition: bottom 0.4s ease;
            border-left: 5px solid var(--blue); box-shadow: 0 10px 30px rgba(0,0,0,0.6); font-size: 14px;
        }
        #tooltipToast.active { bottom: 40px; }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="header-top">
        <h1>StockScreener</h1>
        <div class="timestamp-container">
            <span class="update-label">Sist oppdatert</span>
            <div id="ts-date" class="update-time">--.--.--</div>
            <div id="ts-time" class="update-time">--:--</div>
        </div>
    </div>
    <div class="filter-row">
        <button id="f-all" class="filter-btn active-filter" onclick="setFilter('all')">Alle</button>
        <button id="f-mine" class="filter-btn" onclick="setFilter('mine')">Mine</button>
        <button id="f-radar" class="filter-btn" onclick="setFilter('radar')">Radar</button>
    </div>
    <input type="text" id="search" placeholder="Søk ticker eller navn..." onkeyup="render()">
    <div class="sort-row">
        <div id="btn-rsi" class="sort-btn" onclick="setSort('rsi')">RSI</div>
        <div id="btn-volum" class="sort-btn" onclick="setSort('volum')">Vol %</div>
        <div id="btn-rr" class="sort-btn" onclick="setSort('rr')">R/R</div>
        <div id="btn-ticker" class="sort-btn" onclick="setSort('ticker')">Navn</div>
    </div>
</div>

<div id="list">Laster data...</div>

<div id="detailPage">
    <div class="detail-nav"><div class="back-btn" onclick="closeDetail()">← Tilbake</div></div>

    <div id="detailHeaderInfo"></div>

    <div class="time-row">
        <div class="time-btn" id="t-7" onclick="changeTime(7)">1U</div>
        <div class="time-btn active" id="t-30" onclick="changeTime(30)">1M</div>
        <div class="time-btn" id="t-90" onclick="changeTime(90)">3M</div>
        <div class="time-btn" id="t-180" onclick="changeTime(180)">6M</div>
        <div class="time-btn" id="t-365" onclick="changeTime(365)">1Å</div>
    </div>

    <div class="chart-type-row">
        <div class="chart-type-btn" id="ctype-candlestick" onclick="setPriceChartType('candlestick')">Candlestick</div>
        <div class="chart-type-btn" id="ctype-line" onclick="setPriceChartType('line')">Linje</div>
    </div>

    <div class="charts-wrapper">
        <div class="chart-price-container"><canvas id="priceChart"></canvas></div>
        <div class="chart-rsi-container"><canvas id="rsiChart"></canvas></div>
    </div>

    <div id="detailBodyContent"></div>
</div>

<div id="tooltipToast" onclick="hideTip()"></div>

<script>
    let stocks = []; let currentSort = 'ticker'; let isAscending = true; let currentFilter = 'all';
    let myStocks = JSON.parse(localStorage.getItem('myStocks')) || [];
    let radarStocks = JSON.parse(localStorage.getItem('radarStocks')) || [];
    let myGAVs = JSON.parse(localStorage.getItem('myGAVs')) || {};
    let myNotes = JSON.parse(localStorage.getItem('myNotes')) || {};
    let priceChart = null; let rsiChart = null;
    let currentTicker = null;
    let currentDays = 30;
    const PRICE_CHART_TYPE_KEY = 'preferredPriceChartType';
    const normalizeChartType = (type) => type === 'line' ? 'line' : 'candlestick';
    let preferredPriceChartType = normalizeChartType(localStorage.getItem(PRICE_CHART_TYPE_KEY));

    const tooltips = {
        rsi: "<b>RSI (14):</b> 30=Oversolgt, 70=Overkjøpt. De hvite linjene markerer faresonene.",
        volum: "<b>Volum %:</b> Dagens volum mot 20-dg snitt.",
        rr: "<b>Risk/Reward:</b> Oppside mot nedside basert på 50-dagers støtte/motstand.",
        trend: "<b>Trend:</b> Kombinerer pris vs SMA200, SMA50 vs SMA200 og MACD-momentum.",
        sma: "<b>SMA:</b> Glidende snitt (50/200).",
        ema: "<b>EMA:</b> Eksponentielt snitt (9/20/200).",
        support: "<b>Støtte/Motstand:</b> 50-dagers lav/høy brukes som proxy for støtte/motstand."
    };

    // ✅ Bruk alltid "latest raw" for gist (slipper å oppdatere hash)
    const DATA_URL = "https://gist.githubusercontent.com/gullesen/28b92c3d60b920d4ae061dd73d6a5570/raw/aksjer.json?t=" + Date.now();

    // ----------------------------
    // 3-LAGS SIGNALER: TREND / SETUP / RISIKO (forbedret)
    // ----------------------------

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

    function safeNum(v, fallback) {
        const n = Number(v);
        return Number.isFinite(n) ? n : fallback;
    }

    function pctDiff(a, b) {
        // (a-b)/b
        if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return 999;
        return (a - b) / b;
    }

    function getHistory(s, n) {
        if (!s?.Historikk || !Array.isArray(s.Historikk)) return [];
        return s.Historikk.slice(-n);
    }

    function getLastCloseFromHistory(s) {
        const h = getHistory(s, 1);
        if (!h.length) return NaN;
        return safeNum(h[0].close, NaN);
    }

    function getLastPrice(s) {
        const sc = safeNum(s?.["Siste kurs"], NaN);
        return Number.isFinite(sc) ? sc : getLastCloseFromHistory(s);
    }

    function trendSignal(s) {
        const price = getLastPrice(s);
        const sma50 = safeNum(s?.SMA_50, NaN);
        const sma200 = safeNum(s?.SMA_200, NaN);
        const macdTrend = (s?.MACD_Trend || '').toString();

        const above200 = Number.isFinite(price) && Number.isFinite(sma200) ? price > sma200 : false;
        const below200 = Number.isFinite(price) && Number.isFinite(sma200) ? price < sma200 : false;
        const crossUp  = Number.isFinite(sma50) && Number.isFinite(sma200) ? sma50 > sma200 : false;
        const crossDn  = Number.isFinite(sma50) && Number.isFinite(sma200) ? sma50 < sma200 : false;

        let bullPts = 0, bearPts = 0;
        if (above200) bullPts++;
        if (crossUp) bullPts++;
        if (macdTrend === 'Bull') bullPts++;

        if (below200) bearPts++;
        if (crossDn) bearPts++;
        if (macdTrend === 'Bear') bearPts++;

        if (bullPts >= 2 && bullPts > bearPts) {
            const bits = [
                above200 ? "Pris > SMA200" : null,
                crossUp ? "SMA50 > SMA200" : null,
                macdTrend === "Bull" ? "MACD Bull" : null
            ].filter(Boolean).join(" · ");
            return { label: 'OPPTREND', icon: '🟢', color: 'var(--green)', reason: bits || 'Positivt trendregime' };
        }
        if (bearPts >= 2 && bearPts > bullPts) {
            const bits = [
                below200 ? "Pris < SMA200" : null,
                crossDn ? "SMA50 < SMA200" : null,
                macdTrend === "Bear" ? "MACD Bear" : null
            ].filter(Boolean).join(" · ");
            return { label: 'NEDTREND', icon: '🔴', color: 'var(--red)', reason: bits || 'Negativt trendregime' };
        }
        return { label: 'RANGE / UKLART', icon: '🟡', color: 'var(--yellow)', reason: `Blandet bilde (SMA/MACD)` };
    }

    // Prioritet: Support bounce -> Pullback i opptrend -> Breakout -> Ingen setup
    function setupSignal(s, trend) {
        const price = getLastPrice(s);
        const support = safeNum(s?.Support_50, NaN);
        const resist  = safeNum(s?.Resistance_50, NaN);
        const vol = safeNum(s?.Volum_vs_Snitt, 100);
        const rr  = safeNum(s?.Risk_Reward, NaN);
        const rsi = safeNum(s?.RSI_14, 50);

        const h = getHistory(s, 12);
        const closes = h.map(x => safeNum(x.close, NaN)).filter(Number.isFinite);
        const rsis   = h.map(x => safeNum(x.rsi, NaN)).filter(Number.isFinite);

        // A) SUPPORT BOUNCE
        if (Number.isFinite(price) && Number.isFinite(support) && closes.length >= 3) {
            const lookback = Math.min(closes.length, 8);
            const recent = closes.slice(-lookback);
            const recentMin = Math.min(...recent);
            const nearSupport = recentMin <= support * 1.02;

            const last = recent[recent.length - 1];
            const prev = recent[recent.length - 2];
            const prev2 = recent.length >= 3 ? recent[recent.length - 3] : prev;

            const priceUp1 = (last > prev);
            const priceUp2 = (last > prev && prev > prev2);

            let rsiUp = false;
            if (rsis.length >= 2) {
                rsiUp = rsis[rsis.length - 1] > rsis[rsis.length - 2];
            }

            const bounce = nearSupport && (priceUp1 || priceUp2 || rsiUp);
            if (bounce) {
                const vtxt = Number.isFinite(vol) ? `${vol.toFixed(0)}%` : '–';
                const rrtxt = Number.isFinite(rr) ? rr.toFixed(2) : '–';
                return {
                    label: 'SUPPORT BOUNCE',
                    icon: '🟢',
                    color: 'var(--green)',
                    reason: `Testet støtte · Vending bekreftet · Vol ${vtxt} · R/R ${rrtxt}`
                };
            }
        }

        // B) PULLBACK I OPPTREND
        const ema20 = safeNum(s?.EMA_20, NaN);
        const sma50 = safeNum(s?.SMA_50, NaN);

        if (trend.label === 'OPPTREND' && Number.isFinite(price)) {
            const nearEma20 = Number.isFinite(ema20) ? Math.abs(pctDiff(price, ema20)) <= 0.02 : false;
            const nearSma50 = Number.isFinite(sma50) ? Math.abs(pctDiff(price, sma50)) <= 0.02 : false;
            const okRsi = rsi <= 68;

            if ((nearEma20 || nearSma50) && okRsi) {
                const targetRef = nearEma20 ? 'EMA20' : 'SMA50';
                return {
                    label: 'PULLBACK (TREND)',
                    icon: '🟡',
                    color: 'var(--yellow)',
                    reason: `Opptrend · Pullback nær ${targetRef} · RSI ${rsi.toFixed(0)}`
                };
            }
        }

        // C) BREAKOUT / MOMENTUM
        if (Number.isFinite(price) && Number.isFinite(resist)) {
            const breakout = price >= resist * 0.998 && vol >= 120;
            if (breakout) {
                return {
                    label: 'BREAKOUT',
                    icon: '🟡',
                    color: 'var(--yellow)',
                    reason: `Brudd motstand · Vol ${vol.toFixed(0)}%`
                };
            }
        }

        return {
            label: 'INGEN SETUP',
            icon: '⚪️',
            color: 'var(--secondary)',
            reason: `Ingen tydelig støtte-bounce / pullback / breakout nå`
        };
    }

    function riskSignal(s, trend, setup) {
        const rsi = safeNum(s?.RSI_14, 50);
        const rr  = safeNum(s?.Risk_Reward, NaN);
        const vol = safeNum(s?.Volum_vs_Snitt, 100);

        const reasons = [];

        // Overkjøpt / overstretched
        if (rsi >= 75) reasons.push(`RSI ${rsi.toFixed(0)} svært høy`);
        else if (rsi >= 70) reasons.push(`RSI ${rsi.toFixed(0)} overkjøpt`);

        // Lav R/R
        if (Number.isFinite(rr) && rr < 1.0) reasons.push(`Lav R/R (${rr.toFixed(2)})`);

        // Svak volumstøtte
        if (vol < 80) reasons.push(`Svak volumstøtte (${vol.toFixed(0)}%)`);

        // Ekstremt lav RSI
        if (rsi <= 25) reasons.push(`RSI ${rsi.toFixed(0)} ekstremt lav`);

        let level = 'LAV';
        let icon = '🟢';
        let color = 'var(--green)';

        const inDowntrend = trend.label === 'NEDTREND';
        const inUptrend = trend.label === 'OPPTREND';

        const highRisk = (
            (rsi >= 75) ||
            (inDowntrend && setup.label === 'INGEN SETUP') ||
            (rsi >= 70 && !inUptrend)
        );

        const mediumRisk = (
            reasons.length >= 1 ||
            (inDowntrend && setup.label !== 'SUPPORT BOUNCE') ||
            (!inUptrend && Number.isFinite(rr) && rr < 1.2)
        );

        if (highRisk) {
            level = 'HØY'; icon = '🔴'; color = 'var(--red)';
        } else if (mediumRisk) {
            level = 'MIDDELS'; icon = '🟡'; color = 'var(--yellow)';
        }

        return {
            label: level,
            icon,
            color,
            reason: reasons.length ? reasons.join(' · ') : `Ingen klare røde flagg`
        };
    }

    function computeThreeSignals(s) {
        const trend = trendSignal(s);
        const setup = setupSignal(s, trend);
        const risk  = riskSignal(s, trend, setup);
        return { trend, setup, risk };
    }

    // Mini-ikoner til liste (3-lag)
    function miniDot(sigObj) {
        if (sigObj.icon === '🔴') return { icon:'🔴', color:'var(--red)' };
        if (sigObj.icon === '🟢') return { icon:'🟢', color:'var(--green)' };
        if (sigObj.icon === '🟡') return { icon:'🟡', color:'var(--yellow)' };
        return { icon:'⚪️', color:'var(--secondary)' };
    }

    async function load() {
        try {
            const res = await fetch(DATA_URL, { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            if (data && data.aksjer) {
                stocks = data.aksjer.filter(s => s.Aksje && s.Historikk && Array.isArray(s.Historikk));
                if (data.oppdatert) {
                    const tp = data.oppdatert.split(" ");
                    document.getElementById('ts-date').innerText = tp[0] || '--.--.--';
                    document.getElementById('ts-time').innerText = tp[1] || '--:--';
                }
            }
            render();
        } catch (e) {
            document.getElementById('list').innerHTML =
                `<div style="background:var(--card); padding:16px; border-radius:14px;">
                    <div style="font-weight:900; margin-bottom:6px;">Feil ved lasting</div>
                    <div style="color:var(--secondary); font-size:13px;">${(e && e.message) ? e.message : 'Ukjent feil'}</div>
                    <div style="color:var(--secondary); font-size:12px; margin-top:8px;">Sjekk at DATA_URL er riktig og at JSON er tilgjengelig.</div>
                </div>`;
        }
    }

    function showTip(e, key) {
        if(e) e.stopPropagation();
        const toast = document.getElementById('tooltipToast');
        toast.innerHTML = tooltips[key] || "";
        toast.classList.add('active');
        setTimeout(hideTip, 5000);
    }
    function hideTip() { document.getElementById('tooltipToast').classList.remove('active'); }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
        document.getElementById('f-' + f).classList.add('active-filter');
        render();
    }

    function setSort(field) {
        if (currentSort === field) isAscending = !isAscending;
        else { currentSort = field; isAscending = (field === 'ticker' || field === 'rsi'); }
        render();
    }

    function changeTime(days) {
        currentDays = days;
        updateChart(days, currentTicker);
    }

    function syncChartTypeButtons() {
        const buttons = document.querySelectorAll('.chart-type-btn');
        if (!buttons.length) return;
        buttons.forEach((btn) => btn.classList.remove('active'));
        const active = document.getElementById('ctype-' + preferredPriceChartType);
        if (active) active.classList.add('active');
    }

    function setPriceChartType(type) {
        const nextType = normalizeChartType(type);
        if (nextType === preferredPriceChartType) return;
        preferredPriceChartType = nextType;
        localStorage.setItem(PRICE_CHART_TYPE_KEY, preferredPriceChartType);
        syncChartTypeButtons();
        if (currentTicker) updateChart(currentDays, currentTicker);
    }

    function getStockHistory(s) {
        if (!s || typeof s !== 'object') return [];
        const historySources = [s.Historikk, s.historikk, s.history, s.History];
        for (const source of historySources) {
            if (Array.isArray(source) && source.length) return source;
    function getStockHistory(s) {
        if (!s || typeof s !== 'object') return [];
        const candidates = [s.Historikk, s.historikk, s.history, s.History];
        for (const c of candidates) {
            if (Array.isArray(c) && c.length) return c;
        }
        return [];
    }

    function normNumber(v, fallback = NaN) {
        if (typeof v === 'string') {
            const normalized = v.replace(',', '.').replace(/\s/g, '');
            const parsed = Number(normalized);
            return Number.isFinite(parsed) ? parsed : fallback;
        }
        const parsed = Number(v);
        return Number.isFinite(parsed) ? parsed : fallback;
            const n = Number(normalized);
            return Number.isFinite(n) ? n : fallback;
        }
        const n = Number(v);
        return Number.isFinite(n) ? n : fallback;
    }

    function pickDate(h, idx) {
        return h?.dato || h?.date || h?.Date || h?.tid || `P${idx + 1}`;
    }

    function buildFallbackHistory(s, length) {
        const base = normNumber(s?.['Siste kurs'], 100);
        const rsi = normNumber(s?.RSI_14, 50);
        return Array.from({ length }, (_, i) => ({
            dato: `P${i + 1}`,
            open: base,
            high: base,
            low: base,
            close: base,
            rsi
        }));
    }


    function destroyChartOnCanvas(canvasId) {
        if (typeof Chart !== 'function' || typeof Chart.getChart !== 'function') return;
        const existing = Chart.getChart(canvasId);
        if (existing) existing.destroy();
    }

    function drawCanvasFallback(canvasId, values, { min = null, max = null, color = '#0a84ff', extraLines = [] } = {}) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const width = Math.max(canvas.clientWidth, 200);
        const height = Math.max(canvas.clientHeight, 120);
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#1c1c1e';
        ctx.fillRect(0, 0, width, height);

        const clean = values.map(v => normNumber(v)).filter(Number.isFinite);
        if (!clean.length) return;

        let vMin = Number.isFinite(min) ? min : Math.min(...clean);
        let vMax = Number.isFinite(max) ? max : Math.max(...clean);
        if (vMax <= vMin) { vMax = vMin + 1; }

        const pad = 10;
        const innerW = width - pad * 2;
        const innerH = height - pad * 2;

        ctx.strokeStyle = '#2c2c2e';
        ctx.lineWidth = 1;
        for (const lineVal of extraLines) {
            const y = pad + (1 - (lineVal - vMin) / (vMax - vMin)) * innerH;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(pad, y);
            ctx.lineTo(width - pad, y);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        values.forEach((raw, i) => {
            const val = normNumber(raw, clean[Math.max(0, i - 1)] ?? clean[0]);
            const x = pad + (i / Math.max(values.length - 1, 1)) * innerW;
            const y = pad + (1 - (val - vMin) / (vMax - vMin)) * innerH;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }


    function openDetail(ticker) {
        currentTicker = ticker;
        const s = stocks.find(x => x.Aksje === ticker);
        const index = stocks.find(x => x.Aksje === "OSEBX.OL") || stocks[0];
        if(!s) return;

        const gav = myGAVs[ticker] || "";
        const note = myNotes[ticker] || "";

        let profitHtml = "";
        if (gav) {
            const diff = ((s["Siste kurs"] - gav) / gav) * 100;
            profitHtml = `<div style="color:${diff >= 0 ? 'var(--green)' : 'var(--red)'}; font-weight:800; font-size:18px; margin-top:5px;">${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%</div>`;
        }

        const getPerf = (obj, dager) => {
            if (!obj || !obj.Historikk || obj.Historikk.length < (dager + 1)) return 0;
            const start = safeNum(obj.Historikk[obj.Historikk.length - (dager + 1)].close, NaN);
            const last = getLastPrice(obj);
            if (!Number.isFinite(start) || !Number.isFinite(last) || start === 0) return 0;
            return ((last - start) / start) * 100;
        };

        const perioder = [{l:'1U',d:5}, {l:'1M',d:21}, {l:'3M',d:63}, {l:'6M',d:126}, {l:'1Å',d:250}];

        const sigs = computeThreeSignals(s);

        document.getElementById('detailHeaderInfo').innerHTML = `
            <div style="text-align:center; margin-bottom:20px;">
                <div style="font-size:32px; font-weight:900;">${s.Aksje}</div>
                <div style="font-size:14px; color:var(--secondary); font-weight:700;">${s.Navn || ""}</div>
                <div style="font-size:26px; font-weight:800; margin-top:10px;">${Number(getLastPrice(s)).toFixed(2)}</div>
                ${profitHtml}
            </div>
        `;

        document.getElementById('detailBodyContent').innerHTML = `
            <div class="info-grid">
                <div class="info-box" onclick="showTip(event, 'rsi')"><div class="label">RSI <i class="info-i">ⓘ</i></div><div class="val">${safeNum(s.RSI_14, 50).toFixed(1)}</div></div>
                <div class="info-box" onclick="showTip(event, 'volum')"><div class="label">Vol % <i class="info-i">ⓘ</i></div><div class="val">${safeNum(s.Volum_vs_Snitt, 0).toFixed(0)}%</div></div>
                <div class="info-box" onclick="showTip(event, 'rr')"><div class="label">R/R <i class="info-i">ⓘ</i></div><div class="val">${safeNum(s.Risk_Reward, 0).toFixed(2)}</div></div>
                <div class="info-box" onclick="showTip(event, 'trend')"><div class="label">Trend <i class="info-i">ⓘ</i></div><div class="val" style="color:${s.MACD_Trend==='Bull'?'var(--green)':'var(--red)'}">${s.MACD_Trend}</div></div>
            </div>

            <div class="signal-box">
                <div class="signal-title">Signaler</div>
                <div class="signal-rows">

                    <div class="signal-row">
                        <div class="signal-left">
                            <div class="signal-label">TREND</div>
                            <div class="signal-reason">${sigs.trend.reason}</div>
                        </div>
                        <div class="signal-pill" style="color:${sigs.trend.color};">
                            <span>${sigs.trend.icon}</span><span>${sigs.trend.label}</span>
                        </div>
                    </div>

                    <div class="signal-row">
                        <div class="signal-left">
                            <div class="signal-label">SETUP</div>
                            <div class="signal-reason">${sigs.setup.reason}</div>
                        </div>
                        <div class="signal-pill" style="color:${sigs.setup.color};">
                            <span>${sigs.setup.icon}</span><span>${sigs.setup.label}</span>
                        </div>
                    </div>

                    <div class="signal-row">
                        <div class="signal-left">
                            <div class="signal-label">RISIKO</div>
                            <div class="signal-reason">${sigs.risk.reason}</div>
                        </div>
                        <div class="signal-pill" style="color:${sigs.risk.color};">
                            <span>${sigs.risk.icon}</span><span>${sigs.risk.label}</span>
                        </div>
                    </div>

                </div>
            </div>

            <div class="rel-strength-box">
                <div class="label" style="margin-bottom:12px;">Relativ styrke vs OSEBX</div>
                <div class="rel-grid">
                    ${perioder.map(p => {
                        const diff = getPerf(s, p.d) - getPerf(index, p.d);
                        return `<div><div style="font-size:10px;color:var(--secondary);font-weight:800;">${p.l}</div>
                                <div style="font-size:12px;font-weight:700;color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${diff.toFixed(1)}%</div></div>`;
                    }).join('')}
                </div>
            </div>

            <div class="tech-list">
                <div class="tech-row" onclick="showTip(event, 'sma')"><span>SMA 50 / 200 ⓘ</span><b>${safeNum(s.SMA_50, 0).toFixed(1)} / ${safeNum(s.SMA_200, 0).toFixed(1)}</b></div>
                <div class="tech-row" style="border:none;" onclick="showTip(event, 'ema')"><span>EMA 9 / 20 / 200 ⓘ</span><b>${safeNum(s.EMA_9, 0).toFixed(1)} / ${safeNum(s.EMA_20, 0).toFixed(1)} / ${safeNum(s.EMA_200, 0).toFixed(1)}</b></div>
            </div>

            <div class="list-actions">
                <button class="action-btn ${myStocks.includes(ticker)?'active-mine':''}" onclick="toggleList('${ticker}', 'mine')">${myStocks.includes(ticker)?'✓ Mine':' + Mine'}</button>
                <button class="action-btn ${radarStocks.includes(ticker)?'active-radar':''}" onclick="toggleList('${ticker}', 'radar')">${radarStocks.includes(ticker)?'✓ Radar':' + Radar'}</button>
            </div>

            <div class="user-data-section">
                <div class="user-data-title">Mine data</div>
                <input type="number" class="gav-input" id="gav-input" value="${gav}" placeholder="Din GAV..." onchange="saveData('${ticker}', 'gav', this.value)">
                <textarea placeholder="Strategi & Notater..." onchange="saveData('${ticker}', 'note', this.value)">${note}</textarea>
            </div>
        `;

        document.getElementById('detailPage').style.display = 'block';
        currentDays = 30;
        syncChartTypeButtons();
        requestAnimationFrame(() => updateChart(currentDays, ticker));
        requestAnimationFrame(() => updateChart(30, ticker));
    }

    function updateChart(dager, ticker) {
        currentDays = dager;
        syncChartTypeButtons();
        const s = stocks.find(x => x.Aksje === ticker);
        if(!s) return;

        const toast = document.getElementById('tooltipToast');
        const sourceHistory = getStockHistory(s);
        const history = (sourceHistory.length ? sourceHistory : buildFallbackHistory(s, dager)).slice(-dager);
        if (!sourceHistory.length) {
            toast.innerHTML = `<b>Mangler historikk:</b> Viser midlertidig linje basert på siste kurs.`;
            toast.classList.add('active');
            setTimeout(hideTip, 3500);
        }
    
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('t-' + dager);
        if(btn) btn.classList.add('active');
    
        if (priceChart) priceChart.destroy();
        if (rsiChart) rsiChart.destroy();
        destroyChartOnCanvas('priceChart');
        destroyChartOnCanvas('rsiChart');
    

        // -------- 1) PRICE: Candlestick (med fallback) --------
        const ctxPrice = document.getElementById('priceChart')?.getContext('2d');
        if (!ctxPrice) return;
    
        const labels = history.map((h, i) => pickDate(h, i));
    
        // Bygg OHLC uten å filtrere bort alt (men dropp rader som mangler close)
        const ohlc = history
            .map((h, i) => ({
                x: i,
                x: pickDate(h, i),
                o: normNumber(h.open),
                h: normNumber(h.high),
                l: normNumber(h.low),
                c: normNumber(h.close)
            }))
            .filter(b => Number.isFinite(b.x) && Number.isFinite(b.o) && Number.isFinite(b.h) && Number.isFinite(b.l) && Number.isFinite(b.c));
    
        const closes = history.map(h => {
            const c = normNumber(h.close);
            return Number.isFinite(c) ? c : null;
        });
    
        // Hvis vi ikke har nok OHLC for candles -> fallback til line
        const wantsCandle = preferredPriceChartType === 'candlestick';
        const canCandle = wantsCandle && (ohlc.length >= 5);
    
        try {
            if (canCandle) {
                priceChart = new Chart(ctxPrice, {
                    type: 'candlestick',
                    data: {
                        datasets: [{
                            label: ticker,
                            data: ohlc,
    
                            // ✅ sørg for synlige farger på mørk bakgrunn
                            color: {
                                up: '#32d74b',
                                down: '#ff453a',
                                unchanged: '#8e8e93'
                            },
                            borderColor: {
                                up: '#32d74b',
                                down: '#ff453a',
                                unchanged: '#8e8e93'
                            }
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: {
                                grid: { color: '#2c2c2e' },
                                ticks: { color: '#8e8e93', font: { size: 10 } }
                            }
                        }
                    }
                });
            } else {
                // Fallback line-chart
                priceChart = new Chart(ctxPrice, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            data: closes,
                            borderColor: safeNum(s.RS_dag, 0) >= 0 ? '#32d74b' : '#ff453a',
                            borderWidth: 2.5,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.15
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: { grid: { color: '#2c2c2e' }, ticks: { color: '#8e8e93', font: { size: 10 } } }
                        }
                    }
                });
    
                if (wantsCandle) {
                    toast.innerHTML = `<b>Viser linjechart:</b> Mangler gyldige OHLC/tidspunkter for candlestick (${ohlc.length}).`;
                    toast.classList.add('active');
                    setTimeout(hideTip, 4500);
                }
            }
        } catch (e) {
            // Hvis plugin ikke lastet / annen feil -> fallback line-chart + feilmelding
            if (typeof Chart === 'function') {
                destroyChartOnCanvas('priceChart');
                priceChart = new Chart(ctxPrice, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            data: closes,
                            borderColor: safeNum(s.RS_dag, 0) >= 0 ? '#32d74b' : '#ff453a',
                            borderWidth: 2.5,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.15
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: { grid: { color: '#2c2c2e' }, ticks: { color: '#8e8e93', font: { size: 10 } } }
                        }
                    }
                });
            }
    
            if (wantsCandle) {
                toast.innerHTML = `<b>Candlestick-feil:</b> ${e?.message || e}.<br><span style="color:var(--secondary);font-size:12px;">Tips: bytt til Linje eller sjekk datoformat/historikk.</span>`;
                toast.classList.add('active');
                setTimeout(hideTip, 6500);
            }
        }
    
        // -------- 2) RSI chart --------
        const ctxRsi = document.getElementById('rsiChart')?.getContext('2d');
        if (!ctxRsi) return;
    
        const rsiValues = history.map(h => {
            const r = normNumber(h.rsi);
            return Number.isFinite(r) ? r : 50;
        });
    
        const line30 = new Array(history.length).fill(30);
        const line70 = new Array(history.length).fill(70);
    

        if (typeof Chart !== 'function') {
            drawCanvasFallback('priceChart', closes, {
                color: safeNum(s.RS_dag, 0) >= 0 ? '#32d74b' : '#ff453a'
            });
            drawCanvasFallback('rsiChart', rsiValues, {
                min: 0,
                max: 100,
                color: '#0a84ff',
                extraLines: [30, 70]
            });
            toast.innerHTML = `<b>Chart.js ikke lastet:</b> Viser enkel fallback-visning.`;
            toast.classList.add('active');
            setTimeout(hideTip, 4500);
            return;
        }

        rsiChart = new Chart(ctxRsi, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        data: rsiValues,
                        borderColor: '#0a84ff',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.2
                    },
                    {
                        data: line70,
                        borderColor: '#ffffff',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        borderDash: [6, 6]
                    },
                    {
                        data: line30,
                        borderColor: '#ffffff',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false,
                        tension: 0,
                        borderDash: [6, 6]
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: {
                            color: '#8e8e93',
                            autoSkip: true,
                            maxTicksLimit: 5,
                            font: { size: 10 }
                        }
                    },
                    y: {
                        min: 0,
                        max: 100,
                        grid: { color: '#2c2c2e', lineWidth: 1 },
                        ticks: {
                            stepSize: 10,
                            color: '#8e8e93',
                            callback: (v) => ([0, 30, 50, 70, 100].includes(v) ? v : ''),
                            font: (ctx) => {
                                const v = ctx.tick?.value;
                                return { size: 10, weight: (v === 30 || v === 70) ? 'bold' : 'normal' };
                            }
                        }
                    }
                }
            }
        });

        setTimeout(() => {
            priceChart?.resize();
            rsiChart?.resize();
        }, 0);
    }

    function render() {
        const query = document.getElementById('search').value.toUpperCase();
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active-sort'));
        const activeBtn = document.getElementById('btn-' + currentSort);
        if(activeBtn) {
            activeBtn.classList.add('active-sort');
            activeBtn.innerHTML = (currentSort === 'volum' ? 'VOL %' : currentSort.toUpperCase()) + (isAscending ? "↑" : "↓");
        }

        let filtered = stocks.filter(s => (s.Aksje.toUpperCase().includes(query) || (s.Navn && s.Navn.toUpperCase().includes(query))));
        if (currentFilter === 'mine') filtered = filtered.filter(s => myStocks.includes(s.Aksje));
        if (currentFilter === 'radar') filtered = filtered.filter(s => radarStocks.includes(s.Aksje));

        filtered.sort((a, b) => {
            let vA, vB;
            if(currentSort === 'rsi') { vA = safeNum(a.RSI_14, 0); vB = safeNum(b.RSI_14, 0); }
            else if(currentSort === 'volum') { vA = safeNum(a.Volum_vs_Snitt, 0); vB = safeNum(b.Volum_vs_Snitt, 0); }
            else if(currentSort === 'rr') { vA = safeNum(a.Risk_Reward, 0); vB = safeNum(b.Risk_Reward, 0); }
            else { vA = a.Aksje; vB = b.Aksje; }
            return isAscending ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
        });

        document.getElementById('list').innerHTML = filtered.map(s => {
            const gav = myGAVs[s.Aksje];
            let profitHtml = "";
            if (gav) {
                const diff = ((getLastPrice(s) - gav) / gav) * 100;
                profitHtml = `<span class="profit-badge" style="background:${diff >= 0 ? 'rgba(50,215,75,0.2)' : 'rgba(255,69,58,0.2)'}; color:${diff >= 0 ? 'var(--green)' : 'var(--red)'}">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
            }

            const rsiVal = safeNum(s.RSI_14, 50);
            const rsiColor = (rsiVal > 70) ? 'var(--red)' : (rsiVal < 30) ? 'var(--green)' : 'var(--text)';

            const sigs = computeThreeSignals(s);
            const tDot = miniDot(sigs.trend);
            const sDot = miniDot(sigs.setup);
            const rDot = miniDot(sigs.risk);

            return `<div class="stock-card" onclick="openDetail('${s.Aksje}')">
                <div class="row-top">
                    <div style="display:flex; flex-direction:column;">
                        <span class="ticker">${s.Aksje} ${myStocks.includes(s.Aksje)?'<span class="list-badge">MINE</span>':''} ${profitHtml}</span>
                        <span style="font-size:11px; color:var(--secondary); font-weight:600; margin-top:2px;">${s.Navn || ""}</span>
                    </div>
                    <span class="price">
                        <span class="triple-icons" title="Trend / Setup / Risiko">
                            <span class="sig-dot" style="color:${tDot.color};">${tDot.icon}</span>
                            <span class="sig-dot" style="color:${sDot.color};">${sDot.icon}</span>
                            <span class="sig-dot" style="color:${rDot.color};">${rDot.icon}</span>
                        </span>
                        ${Number(getLastPrice(s)).toFixed(2)}
                    </span>
                </div>
                <div class="row-indicators">
                    <div class="mini-stat"><span class="label">RSI</span><span class="val" style="color:${rsiColor};">${rsiVal.toFixed(0)}</span></div>
                    <div class="mini-stat"><span class="label">VOL %</span><span class="val">${safeNum(s.Volum_vs_Snitt, 0).toFixed(0)}%</span></div>
                    <div class="mini-stat"><span class="label">Trend</span><span class="val">${s.MACD_Trend || ""}</span></div>
                    <div class="mini-stat"><span class="label">R/R</span><span class="val">${safeNum(s.Risk_Reward, 0).toFixed(1)}</span></div>
                </div>
            </div>`;
        }).join('');
    }

    function toggleList(ticker, type) {
        let list = type === 'mine' ? myStocks : radarStocks;
        let other = type === 'mine' ? radarStocks : myStocks;
        const idx = list.indexOf(ticker);
        if (idx > -1) list.splice(idx, 1);
        else {
            list.push(ticker);
            const oIdx = other.indexOf(ticker);
            if(oIdx > -1) other.splice(oIdx, 1);
        }
        localStorage.setItem('myStocks', JSON.stringify(myStocks));
        localStorage.setItem('radarStocks', JSON.stringify(radarStocks));
        openDetail(ticker);
        render();
    }

    function saveData(ticker, field, val) {
        if (field === 'gav') {
            if (!val || val == 0) delete myGAVs[ticker];
            else myGAVs[ticker] = parseFloat(val);
            localStorage.setItem('myGAVs', JSON.stringify(myGAVs));
        } else {
            if (!val) delete myNotes[ticker];
            else myNotes[ticker] = val;
            localStorage.setItem('myNotes', JSON.stringify(myNotes));
        }
        render();
    }

    function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }

    // Start
    load();
</script>
